front:
  text: 自序三十三年秋我在北碚漢藏教理院講阿含講要十三講而止講稿陸續發表於海潮音由於文字通俗得到讀者不少的同情但這還是沒有完成的殘稿今春講學廈島才將原稿的十三講除去第一講阿含經的判攝把其餘的修正補充而重編為九章即今第三章到十二章其中第七章是採用舊作行為的價值與生命而改寫的前面又補寫緒言與初二章略論佛法的根本三寶又寫了十三章到二十章八章說明學佛者淺深不等的行證關於佛法我從聖龍樹的中觀論得一深確的信解佛法的如實相無所謂大小大乘與小乘只能從行願中去分別緣起中道是佛法究竟的唯一正見所以阿含經是三乘共依的聖典當然阿含經義是不能照著偏執者否認大乘的小乘者離開小乘的大乘者的見地來解說的從佛法一味大小異解的觀點去觀察對於菩薩行的慈悲利他的積極性等也有所理會深深的覺得初期佛法的時代適應性是不能充分表達釋尊的真諦的大乘的應運而盛行雖帶來新的方便適應更以異方便助顯第一義但大乘的真精神是能正直捨方便但說無上道的確有它獨到的長處佛法的流行人間不能沒有方便適應但不能刻舟求劍而停滯於古代的原來釋尊時代的印度宗教舊有沙門與婆羅門二大類應機設教古代的聲聞法主要是適應於苦行厭世的沙門根性菩薩法主要是適應於樂行事神的婆羅門根性這在古代的印度確乎是大方便但在時異境遷的今日今日的中國多少無上妙方便已失卻方便大用反而變為佛法的障礙物了所以弘通佛法不應為舊有的方便所拘蔽應使佛法從新的適應中開展這才能使佛光普照這現代的黑暗人間我從這樣的立場來講阿含經不是看作小乘的也不是看作原始的著重於舊有的抉發希望能刺透兩邊讓佛法在這人生正道中逐漸能取得新的方便適應而發揚起來為了避免一般的以阿含經為小乘的誤解所以改題為佛法概論佛法是理智的德行的宗教是以身心的篤行為主而達到深奧與究竟的從來都稱為佛法近代才有稱為佛學的佛法流行於人間可能作為有條理有系統的說明使它學術化但佛法的本質決非抽象的概念而已決不以說明為目的佛法的正解也決非離開信戒而可以成就的法為佛法的根本問題信解行證不外乎學佛者傾向於法體現於法的實踐所以本論雖是說明的可說是佛法而學的但仍舊稱為佛法概論保持這佛法的根本立場我願意讀者本著這樣的見地去讀它舊稿積壓了四五年由於廈島講學因緣才續寫完成得以印行流通這一切都得到學友妙欽法師的助力特附此志謝民國三十八年八月二十一日校畢序
