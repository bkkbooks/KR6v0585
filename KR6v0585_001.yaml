個我的定義是同的但有情所執自我即在此意義上附入意志的自由性這即不同從實在常在獨存的意義説有情是無我空的諸法也是無我空的本性空寂也即是涅槃這樣諸行無常諸法無我涅槃寂靜的三法印遍通一切為有情與世間的真理三法印的實踐性佛説三法印是非常善巧的同一命題而作兩方面解説既是事物的真相普遍理性也就是實踐的過程這三者的深義本是同樣的每一法印能開顯正覺的內容即每一法印能離執證真依無常門而悟入的即無願解脫門依無我而悟入的即空解脫門依涅槃寂滅而悟入的即無相解脫門由於有情的根性不同所以或説此或説彼或説二印或説三印如完備三法印依聲聞常道説即先觀無常由無常而觀無我由無我而到涅槃為修行的次第過程如經中常説厭離欲解脫這即是依三法印修行的次第觀諸行無常即能厭患世間而求出離能厭苦即能通達無我無我我所執即離一切愛欲離欲即離一切煩惱所以能得涅槃解脫這可見三法印的教説是將諸法的真相與修行的歷程主觀與客觀事實與價值一切都綜合而統一了這是佛陀唯一的希有教法龍樹在大智度論裡説無常為空門空為無生門這也是合於三法印次第的他所説的空即是無我無生即是涅槃的異名第二節三法印與一法印從無我中貫徹一切本章的標題是三大理性的統一三者能不能統一有的學者以為三法印中的諸行無常與涅槃寂靜是相反的因為凡是無常的即是有為法有為法是生住異滅的涅槃是無為法無為是不生不滅的生滅的與不生滅的如何統一因此古來某些學派為這二者的矛盾所困惱看重無常將涅槃看作無常以外的重視涅槃常住的又輕忽了無常這樣佛法的完整性統一性被破壞了其實三法印是綜貫相通的能統一三者的即著重於三法印中的諸法無我印諸法通於有為與無為從有為無為同是無我性去理解即能將常與無常統一起來諸法的無我性可從緣起法去説明緣起法本通兩方面説一流轉的因果相生即是無常二還滅的因果寂滅即是涅槃所以緣起能貫徹這兩端緣起是無我性的無我也即能貫通這兩端了諸法的所以相生還滅可以這樣的理解一切法因緣和合所以能生因緣離散所以一切法歸於滅看起來似乎有什麼實體在那裡生滅其實並沒有實自性的生滅如真是實有的那也就用不著生了如確乎是真實有它也決不會滅所以從一切法的相生還滅理解它本來無自性空的本來無我的這三印統一於空無我的思想非常深徹惟有佛的弟子像舍利弗等才能完滿的通達且拿佛化迦旃延經來説迦旃延是佛弟子中論議第一的佛為他説中道法世人依於二見墮於有邊與無邊佛説中道的緣起法即不落二邊一般人見到法生就起有見見到法滅就起無見如常人見一朵花以為實有此花體等到花謝落就以為什麼都沒有了小孩從母胎出生以為實有這個有情自體等到死了又以為什麼都沒有了世間常人總是如此實有實無的倒見佛説緣起法就不同了見到法的生起知道此有故彼有此生故彼生此法的名相因果都可以説有因此而不起無見見到法的滅去知道是此無故彼無此滅故彼滅由此而不起有見能離有無二見就是安住於中道了不解緣起本空容易認為佛法是詭辨為什麼常人會於生滅法起有無見到了佛弟子還是照樣的生滅就不生有無見呢不知道這因為常人的心目中總是認為真實不空的所以見生見滅即落於有見無見學佛的了達一切法本是空無我的一切現象的有生有滅佛法並不否認它現象確是有因果體用的有現起與還滅的但沒有一些是實在的常住的獨存的僅是如幻的生滅而已能把握這一點就不落有無正處中道了無常與常的貫徹即在這緣起的空無我中建立照上面説一切法都是緣起的沒有真實性所以生而不起有見滅而不起無見生滅都是緣起本空的緣起法的歸於滅説它是空這不是因緣離散才是滅是空當諸法的生起時存在時由於了無自性可得所以是如幻如化空的寂滅的從無我而深入的本空本寂滅本性不生不滅即在這緣起的生滅無常中看出生滅無常即是空無我的空無我即是不生不滅的不生不滅即是生滅無常的這樣緣起法的本性空無我就貫徹三印了一部分學者的誤會即以為涅槃是要除滅什麼如海中的波浪息滅才能説是平靜一樣因此常與無常生滅與不生滅對立而不能統一對於緣起法的流轉與還滅也打成兩橛要是從緣起無我的深義去了解那麼法的生起是幻起還滅是幻滅生滅無常而本來空寂所以佛弟子的證得涅槃不過是顯出諸法實相還它個本來如是三法印那裡是隔別對立而不可貫通呢三法印即是一法印平常説小乘三法印大乘一實相印這是似乎如此而並不恰當的阿含經與聲聞學者確乎多説三法印大乘經與大乘學者也確乎多説一法印這三印與一印好像是大乘小乘截然不同的其實這不過多説而已佛法本無大小佛法的真理並沒有兩樣也不應該有兩樣無常無我寂滅從緣起法相説是可以差別的豎觀諸法的延續性念念生滅的變異稱為無常橫觀諸法的相互依存彼此相關而沒有自體稱為無我從無常無我的觀察離一切戲論深徹法性寂滅無纍自在稱為涅槃雜阿含經卷一二七經説無常想者能建立無我想聖弟子住無我想心離我慢順得涅槃這是依三法印而漸入涅槃的明證然而真得無我智的真能體證涅槃的從無我智證空寂中必然通達到三法印不外乎同一法性的內容由於本性空所以隨緣生滅而現為無常相如實有不空那生的即不能滅滅的即不能生沒有變異可説即不成其為無常了所以延續的生滅無常相如從法性説無常即無有常性即事相所以有變異可能的理則彼此相依相成一切是衆緣和合的假有沒有自存體所以從法性説無我即無有我性無我性所以現象是這樣的相互依存這樣相續的和合的有情生死如得無我智即解脫而證得涅槃涅槃的不生不滅從事相上説依此無故彼無此滅故彼滅的消散過程而成立約法性説這即是諸法本性本來如此一一法本自涅槃涅槃無生性所以能實現涅槃寂滅無常性無我性無生性即是同一空性會得佛法宗旨三法印即三解脫門觸處能直入佛陀的正覺由於三法印即同一空性的義相所以真理並無二致否則執無我執無常墮於斷滅中這那裡可稱為法印呢佛為一般根性大抵從無常無我次第引入涅槃但為利根如迦旃延等即直示中道不落兩邊聲聞弟子多依一般的次第門所以在聲聞乘中多説三法印大乘本是少數利根者在悟得無生法忍即一般聲聞弟子以為究竟了的境界不以為究竟還要悲願利他從這無生的深悟出發所以徹見三法印的一貫性惟是同一空性的義相這才弘揚真空説一切皆空是究竟了義拘滯名相的傳統學者信受三法印而不信一法印久之大乘者也數典忘祖自以為一法印而輕視三法印了惟有龍樹的中觀學能貫徹三印與一印如大智度論卷二二説有為法無常念念生滅故皆屬因緣無有自在無有自在故無我無常無我無相故心不著無相不著故即是寂滅涅槃又説觀色念念無常即知為空空即是無生無滅無生無滅及生滅其實是一説有廣略這真是直探佛法肝心的名論第十三章中道泛論第一節人類的德行從神到人佛法不是為了説明世間而是為了解放自己淨化世間佛法是理智的德行的知行綜貫的宗教要從生活的經驗中實現出來説它是最高的哲學不如説它是完善的道德深化又廣化的道德好釋尊從正覺中開示了緣起支性更開示了聖道支性聖道是恰到好處的道德是向上向正覺所必經的常道所以稱為中道正道古仙人道這是佛陀所開示的惟一的人生正道八正道正道的具體説明關涉到極深極廣現在先略説它的兩大特色神教者以為德行的根源是神的德行只是人怎麼服事神人怎麼體貼神的意思來待人如離開了神德行即無從説起所以在神教中不但人的德行變成了神的奴役而迷妄的宗教行為也被看為道德的有價值的釋尊的中道行與神教相反從人與人自他的合理行為深化到內心擴大到一切有情無邊世界從人本的立場使德行從神的意旨中解放出來中阿含經伽彌尼經説梵志婆羅門自高事若干天若衆生命終者彼能令自在往來善處生於天上這種神教的祈禱祭師的神權佛以為這等於投石水中站在岸上祈禱希望大石會浮起來實則我們前途的苦樂決定於我們行業的善惡決不會因天神與祭師的祈禱而有所改變所以説奉事日月水火唱言扶接我去生梵天者無有是處長阿含經三明經神教的祭祀萬能特別是血祭釋尊也反對它若邪盛大會繫群少特牛水特水牸及諸羊犢小小衆生悉皆傷殺逼迫苦切僕使作人鞭笞恐怛悲泣號呼如是等邪盛大會我不稱嘆雜阿含經卷四八九經作是布施供養實生於罪卷四九三經這種殘殺犧牲虐待僕役的大祭祀那裡是布施簡直是作惡所以當時的人都以為沙門瞿曇呵責一切諸祭祀法對於吠陀特別是阿闥婆吠陀中的咒法以及占卜星相等迷信如長阿含經梵動經説沙門瞿曇無如是事這些都是無知的産物凡是見真諦人信卜問吉凶者終無是處生極苦乃至斷命捨離此內更從外道求或持一句呪二句三句四句多句百千句呪令脫我苦終無是處中阿含經多界經説得徹底些如雜阿含經卷四一一一八經説幻法若學者令人墮地獄總之因神教而引起的祈禱祭祀咒術種種迷信行為佛法中一概否認不但否定神教的迷信行為而且巧妙的改造它如婆羅門教的祭祀用三火佛也説三火但三火是供養父母名根本火供養妻兒眷屬名居家火供養沙門婆羅門名福田火雜阿含經卷四九三經神教徒禮拜六方佛也説禮拜六方但這是親子師生夫婦親友主僕宗教師與信徒間的合理的義務中阿含經善生經釋尊肅清了神教的宗教道德使人生正道從神教中解放出來確立於人類的立場為佛法中道的特色從少數人到多數人人類原為平等的由於職業的分化成為不同的職業層由種族的盛衰造成自由民與奴隸這是古代社會的一般情形初期的宗教與種族相結合成為氏族的宗教這才因種族的盛衰而弱者的宗教被排斥宗教就成為勝利者的特權如耶和華為以色列人的上帝以色列人是上帝的選民婆羅門教為婆羅門剎帝利吠奢的宗教首陀羅沒有依宗教而得再生的權利印度的四姓階級制不但是世俗的而且與宗教相附合佛以為四姓皆等無有種種勝如差別因為無論從財力説從法律説從政治説從道德説雜阿含經卷二五四八經從女人所生説從隨業受報與修道解脫説中阿含經婆羅婆堂經四姓完全是平等的是機會均等的四姓不過是職業分化人為的非法階級婆羅門假託神權的四姓説等於如有人強與他肉而作是説士夫可食當與我直中阿含經鬱瘦歌邏經佛説四姓平等即種族優劣的根本否定這在宗教中佛法即為一切人的宗教所以四姓出家學道無復本姓但言沙門釋迦弟子增一阿含經苦樂品優婆離尊者出身賤族為持律第一上座這可見佛法的人類平等精神男與女約信仰德行智慧佛法中毫無差別如在家的信衆男子為優婆塞女子即是優婆夷出家衆男子為沙彌比丘女子即為沙彌尼比丘尼女衆與男衆同樣的可以修道解脫依這道器的