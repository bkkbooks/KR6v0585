body:
  text: 緒言佛法為佛與法的結合詞佛是梵語佛陀的略稱其義為覺者法是梵語達磨的義譯精確的定義是軌持即不變的軌律佛與法的綴合語應解説為佛的法本來法是非佛作亦非餘人作的本來如此而被稱為法性法爾的有本然性安定性普遍性而被稱為法性法住法界的這常遍的軌律何以要稱為佛法因為這是由於印度釋迦牟尼佛的創見而後才流行人間的佛為法本法由佛出所以稱之為佛法依佛的法而引伸其意義又得兩個解説一諸佛常法法是本來如此的佛是創覺世間實相者的尊稱誰能創覺此常遍的軌律誰就是佛不論是過去的現在的未來的佛始終是佛佛道同釋迦佛的法與一切佛的法平等平等二入佛法相故名為佛法法是常遍的因佛的創見而稱之為佛法佛弟子依佛覺證而流出的教法去修行同樣的覺證佛所覺證的傳布佛所傳布的在佛法的流行中解説抉擇闡發了佛的法使佛法的甚深廣大能充分的表達出來這佛弟子所覺所説的當然也就是佛法這兩點是佛法應有的解説但我們所知的諸佛常法到底是創始於釋迦牟尼佛依釋尊的本教為根源的佛弟子所弘布的是否佛法在乎他是否契合釋尊根本教法的特質所以應嚴格的貫徹這一見地抉擇流行中的諸佛常法與弟子的論述此外世間一切微妙善語皆是佛法南傳增支部釋尊説我所説法如爪上塵所未説法如大地土升攝波經這可見有益身心家國的善法釋尊也多有不曾説到的釋尊所覺證而傳布的法雖關涉極廣但主要是究盡法相的德行的宗教佛法是真實的正確的與一切真實而正確的事理決不是矛盾而是相融貫的其他真實與正確的事理實等於根本佛法所含攝的根本佛法所流出的所以説一切世間微妙善語皆是佛法這可見謂有沙門執著文字離經所説終不敢言大毗婆沙論實在不夠了解佛法在佛法的流行中融攝與釋尊本教不相礙的善法使佛法豐富起來能適應不同的時空這是佛法應有的精神佛的法是根本的諸佛常法與入佛法相的佛法是豎貫的深入的融貫的佛法是旁通的千百年來流行於人間的佛法不外乎契合這三者而構成第一章法與法的創覺者及奉行者第一節法文義法從佛法流行人間説佛陀與僧伽是比法更具體的更切實的但佛陀是法的創覺者僧伽是奉行佛法的大衆這都是法的實證者不能離法而存在所以法是佛法的核心所在那麼法是什麼在聖典中法字使用的範圍很廣如把不同的內容條理而歸納起來可以分為三類一文義法二意境法三學佛者所歸依的法釋尊説法重在聲名句文的語言書寫的文字以後才發達使用起來語言與文字可以合為一類因為語文雖有音聲與形色的差別而同是表詮法義的符號可以傳達人類一分衆生也有的思想與情感如手指的指月雖不能直接的顯示月體卻能間接的表示它使我們因指而得月由於語言文字能表達佛法所以也就稱語文為法但這是限於表詮佛法的如佛滅初夏王舍城的五百結集就稱為集法藏然此能詮的語文法有廣狹二類一凡是表詮佛法的語文都可以稱為法這是廣義的二因佛法有教授與教誡二類在教化的傳布中佛法就自然地演化為法與毗奈耶二類等到結集時結集者就結集為法藏與毗奈耶藏與毗奈耶藏相對的法藏那就局限於經藏了意境法成唯識論説法謂軌持軌持的意義是軌生他解任持自性這是説凡有他特有的性相能引發一定的認識就名為法這是心識所知的境界在這意境法中也有兩類一別法處佛約六根引發六識而取境來説所知境也分為六其中前五識所覺了分別的是色聲香味觸意識所了知的是受想行三者法受是感情的想是認識的行是意志的這三者是意識內省所知的心態是內心活動的方式這只有意識才能明了分別是意識所不共了別的所以名為別法二一切法意識不但了知受想行別法眼等所知的色等也是意識所能了知的所知的就是能知也可以成為所知的一切都是意識所了知的都是軌生他解任持自性的所以泛稱為一切法歸依法法是學佛者所歸依的約歸依法説不離文義法又不可著在文義法因為文義只是佛法流傳中的遺痕也不可落在意境法因為這是一切的一切善惡邪正都是法不能顯出佛法的真義何在學者所歸依的法可分為三類一真諦法二中道法三解脫法其中根本又中心的是中道的德行是善釋尊説邪見非法正見是法乃至邪定非法正定是法雜阿含經卷二八七八二經正見正志正語正業正命正勤正念正定八正道為中道法的主要內容當釋尊初轉法輪時一開口就説莫求欲樂極下賤業為凡夫行是説一邊亦莫求自身苦行至苦非聖行無義相應者是説二邊離此二邊則有中道中阿含經拘樓瘦無諍經這中道就是八正道到釋尊入滅的時候又對阿難説自歸依歸依於法勿他歸依長阿含經遊行經意思説弟子們應自己去依法而行所依的法經上接著説依四念處行四念處就是八正道中正念的內容這可見法是中道的德行了法既然是道德的善行那不善的就稱為非法釋尊的筏喻經説法尚應捨何況非法正是這個意思中道正道的德行為什麼稱為法法的定義是軌持軌是軌律軌範持是不變不失不變的軌律即是常道八正道不但合乎道德的常道而且就是古仙人道有永久性普遍性是向上向解脫的德行的常道這不妨再看得遠些在印度古代文明的吠陀中陀利一詞泛指一切軌律到後來軌律的思想分化了凡是良善的俗習道德的行為具體或抽象的軌律改稱為達磨法而陀利卻被專用在事相的儀式上佛世前後婆羅門教製成法經又有許多綜合的法論都論到四姓的義務社會的法規日常生活的規定印度人心目中的達磨除了真理以外本注重合理的行為如傳説中輪王的正法化世也就是德化的政治釋尊所説的法內容自然更精確更深廣但根本的精神仍在中道的德行中道的德行是達磨的第一義中道行是身心的躬行實踐是向上的正行在向上的善行中有正確的知見有到達的目的向上向解脫的正行到達無上究竟解脫的實現這實現的究竟目的解脫也稱為法經中稱它為無上法究竟法也稱為勝義法如俱舍論卷一説若勝義法唯是涅槃這是觸證的解脫法如從火宅中出來享受大自然的清涼所以説如露地而坐釋尊初成佛時的受用法樂就是現證解脫法的榜樣説到正確的知見這不但正知現象的此間所達到的彼岸也知道從此到彼的中道這不但認識而已是知道它確實如此知道這是不變的真理這是説緣起知道生死衆苦是依因而集起的惟有苦集起的滅才能得到衆苦的寂滅這非八正道不可這樣的如實知也就是知四真諦法苦真實是苦集真實是集滅真實是滅道真實是道這四諦也稱為法如初見真諦經上稱為知法入法不復見我唯見正法於法得無所畏能見真諦的智慧稱為得法眼淨釋尊的初轉法輪就是開示四諦法這三類歸依法中正知解脫中道與變動苦迫的世間是真實中道是善行觸證的解脫是淨妙真實善行淨妙貫徹在中道的德行中八正道的最初是正見正見能覺了真諦法知是行的觸角是行的一端在正行中知才能深刻而如實離了中道的正行沒有正知所以佛法的正見真諦近於哲學而與世間的哲學不同同時八正道的最後是正定是寂然不動而能體證解脫的這正定的體證解脫從中道的德行中來所以近於宗教的神祕經驗而與神教者的定境幻境不同也就因此中道行者有崇高的理智有無上解脫的自由雖説是道德的善也與世間的道德不同中道統一了真諦與解脫顯出釋尊正覺的達磨的全貌中道正見正志正語正業正命正勤正念正定真諦解脫第二節佛法的創覺者佛覺苦覺樂覺中道佛法的創説者釋迦牟尼佛是中印度迦毗羅國王子少年時代享受人間的五欲二十九歲的春天忽然不顧社稷與家庭踰城出家去了從此過著謹嚴淡泊的生活一直到八十歲釋尊的所以出家依中阿含經柔軟經説釋尊到野外去遊散順便看看田間的農人看了農作的情形不覺引起無限的感慨不忍貧農的飢渴勞瘠又不得不繼續工作不忍衆生的自相殘殺不忍老死的逼迫這種世間大苦的感覺是深切的經驗是將自己的痛苦與衆生的痛苦打成一片見衆生的痛苦而想到自己的痛苦釋尊經此感動不滿傳統的婆羅門教與政治自憫憫人於是不忍再受王宮的福樂為了探發解脫自我與衆生苦迫的大道決意擺脫一切去出家出家是勘破家庭私欲占有制的染著難捨能捨難忍能忍解放自我為世界的新人衆生這樣的愚昧五濁惡世的人間又這樣的黑暗浮沈世海的人類為世間的塵欲所纍早已隨波逐浪自救不了那不妨從黑漆繳繞的人間傳統的社會中解放出來熱腸而冷眼的去透視人間鍛鍊自己作得主站得穩養成為世為人的力量釋尊不從自我的立場看世間才能真正的理解世間救護世間看了釋尊成佛以後的遊化人間苦口婆心去教化人類的事實就明白釋尊出家的真意在出家修學的過程中釋尊又有一番新的覺悟原來當時印度流行的新宗教主要的為定樂與苦行禪定中如無所有定與非想非非想定釋尊都曾修學過但覺得這還是不徹底的不能由此正覺人生的實相因此又到苦行林中與苦行者為伍經歷六年的苦行但末了覺得這也不是正道約克制情欲説苦行似乎有相當的意義但過分的克己對於人類與自己有何利益這樣否定了定樂與苦行以敏鋭的智慧從中道的緣起觀完成圓滿的正覺釋尊的正覺是從己及人而推及世間徹悟自他心物的中道深徹的慧照中充滿了同情的慈悲即人成佛釋尊是人間的聖者這本是歷史的事實但釋尊又給豫深刻的含義説諸佛世尊皆出人間非由天而得也增一阿含經等見品這是説佛是人間的正覺者不在天上天上沒有覺者有的是神梵天上帝天主們與他的使者釋尊是人不是天上的上帝也沒有冒充上帝的兒子與使者向人類説教所以佛法是人間覺者的教化也不像神教者説經典吠陀新舊約可蘭經等為神的啓示這佛出人間的論題含有無神論的情調天上依印度人與一般神教者的看法是淨潔的光明的喜樂的而人間卻充滿了罪惡黑暗與苦痛但釋尊從佛出人間人身難得的見地否認它理智的正覺解脫的自由在人間不在天上所以説人間於天則是善處增一阿含經等見品人間反成為天神仰望的樂土了人生不但是為了追求外物的五欲樂也不在乎嘗受內心神祕的定樂應重視人間為正覺的解脫而勵行理智的德行人類的心眼早被神教者引上渺茫的天國到釋尊才把他們喚回人間據傳説印度的梵天世界的創造者為了無力拯救人間誠懇的請佛為人類説法印度的群神都向釋尊請教自稱弟子天帝們需要正覺與解脫反證他們的愚昧不自由所以智者不依天要歸依兩足尊人的佛陀釋尊出在人間所以是即人成佛的是淨化人性而達到正覺解脫的釋尊是人與人類一樣的生老病死飲食起居眼見耳聞這父母所生身是釋尊的生身同時釋尊有超一般人的佛性是正覺緣起法而解脫的這是釋尊的法身釋尊是人而佛佛而人的人類在經驗中迫得不滿現實而又著重現實要求超脫而又無法超脫重視現實者每缺乏崇高的理想甚至以為除了實利一切是無謂的遊戲而傾向超脫者又離開現實或者隱遁或者寄託在未來他方崇高的超脫平淡的現實不能和諧合一確是人間的痛事到釋尊即人成佛才把這二者合一由於佛性是人性的淨化究竟所以人人可以即人成佛到達一切衆生皆成佛道的結論自覺與覺他佛陀的正覺不單是理智的解悟是明月一般的在萬里無雲的空中遍照一切充滿了光明喜樂與清涼現在姑從自覺與覺他説佛陀是自覺者不同聲聞弟子的悟不由他是自覺誰稱師的自覺佛法由釋尊的創見而流布人間他是創覺者所以稱為佛陀佛世的多聞聖弟子聲聞雖也能正覺解脫與佛同樣的稱為阿羅漢卻沒有被稱為佛的所以我們説釋尊是覺者應重視他的創覺性釋尊本是人而竟被推尊為佛陀了這因為釋尊在菩提樹下創覺緣起法性離一切戲論得到無上的解脫佛陀的所以為佛陀在乎正覺緣起法性這是佛陀的法身釋尊證覺緣起法身而成佛如弟子而正覺緣起法的也能證得法身不過約聞佛的教聲而覺悟説所以稱為聲聞如須陀洹得是法分名為初得法身乃至阿羅漢辟支佛名後得法身羅什答慧遠書能得法身的佛弟子是真能窺見佛陀之所以為佛陀的所以釋尊説見緣起即見法見法即見佛須菩提尊者的深觀法空釋尊也推許他先見我身因釋尊覺法成佛引出見法即見佛的精義再進那就是法身常在釋尊説我諸弟子展轉行之則是如來法身常在而不滅也遺教經法身的是否常在依佛弟子的行踐而定有精勤的實行者就有現覺法性者有能見佛陀的所以為佛陀者法身也就因此而實現在人間佛法的不斷流行有不斷的勤行者法身這才常在人間而不滅法身常在的論題是何等深刻正確而有力釋尊不忍世間的長此黑暗不忘出家的初心開始弘法工作但釋尊完滿的自覺為時代所限不能徹底而詳盡的發揚只能建立適應時機的方便教方便教糅合了一分時代精神厭世的精神使釋尊的究竟道受到限制但不是毫無真實這方便教中蘊蓄的真實道在佛法的流行中已大大的闡發了釋尊是創覺者弟子是後覺先覺覺後覺覺覺不已的住持這覺世的大法要如何才有可能這唯有組織覺者集團的僧伽毗奈耶中説釋尊的所以依法攝僧使佛弟子有如法的集團是為了佛法久住不致於如古聖那樣的人去法滅事實上住持佛法普及佛法也確乎要和樂清淨大衆的負起責任來這和樂僧團的創立是佛陀慧命所寄佛陀在自覺正法上存在於法的體現中在覺他世間上存在於覺者的群衆中釋尊説施比丘衆已便供養我亦供養衆中阿含經瞿曇彌經這佛在僧數的論題表示僧團是佛陀慧命的擴展與延續毗奈耶中説有如法的和合僧這世間就有佛法這可見不但僧在即佛在而且是僧在即法在這一點不但證實釋尊的重視大衆更了解佛法的解脫不是個人的隱遁反而在集團中連自稱辟支佛式的頭陀行者隱遁而苦行的也不許他獨住非半月集合一次不可人間佛陀的真精神那裡是厭世者所見的樣子自覺正法見法即見佛法身常在佛陀創覺者紹隆佛種後覺者僧伽覺他大衆僧在即法在正法久住第三節佛法的奉行者僧建僧的目的釋尊的教化風行恆河兩岸得到不少的信受奉行者其中也有從佛出家的起初釋尊為出家弟子提示了法味同受財利共享的原則等到出家衆一多佛陀開始制戒使他們成為和合的稱之為僧伽衆釋尊的所以以法攝僧不但為了現在的出家衆目的更遠在未來的正法久住釋尊創覺的常道非一般人也非天魔梵印度宗教的神所能轉的惟其難得愛護的心也特別關切所以發現了出家衆的過失就從事僧衆的組織成立僧團的第一義即為了住持佛法佛法雖是探本的簡要的卻是完成的在傳布中可以引伸闡發可以作方便的適應卻沒有修正或補充可説所以佛弟子的弘揚佛法是住持應特別注意佛法本質的保持關於住持佛法雖然在許多經中囑付王公宰官囑付牛鬼蛇神其實除囑付阿難不要忘記而外這正法久住的責任釋尊是鄭重的託付在僧團中和合僧的存在即是正法的存在釋尊的所以制律以法攝僧有十種因緣一者攝僧故二者極攝僧故三者令僧安樂故四者折伏無羞人故五者有慚愧人得安隱住故六者不信者令得信故七者已信者增益信故八者於現法中得漏盡故九者未生諸漏令不生故十者正法得久住摩訶僧祇律卷一這十者是釋尊制戒律的動機與目的而正法久住可説是最後的目的從正法久住的觀點説佛弟子要有組織的集團才能使佛法久住世間這僧團的組合釋尊是把它建築在律制的基礎上嚴格的紀律成為攝受僧衆的向心力攝僧與極攝僧是集團的和合和合的僧衆們有了法律可守這才能各安其分不致有意無意的毀法亂紀引起僧團的動亂糾紛彼此融洽的為道自然能做到令僧安樂有了這律治的和樂僧團可以使僧衆的本身更健全廣大的僧衆雖然賢愚不齊但有了律治的僧團那無慚無愧的犯戒者在大衆的威力下便不能不接受制裁不接受就不能寄生在佛教中有慚愧而真心為道的在集團法律的保障下也能安心的為法護法不會因人事的糾紛而退心這樣的折伏無羞人有慚愧人得安隱住做到了分子健全與風紀嚴肅便是清淨和合安樂清淨為律治僧團的三大美德佛法的久住世間不能離社會而獨立社會的信解佛法作學理的研究者少依佛弟子的行為而決定者多所以如沒有和樂清淨的僧團便難以引起世人的同情如世人誤會或不滿意佛弟子所代表的佛法那佛法的存在就要成問題因此要佛教本身有和樂清淨的僧團才能實現佛法做到不信者令得信已信者增益信僧團的集合不是為了逢迎社會苟存人間是為了實現大衆的身心淨化而得解脫自由的在完善的僧團中人人都容易成為健全的如法的達到內心的淨化不但現在不起煩惱未來也使它不生到最後於現法得漏盡是盡智未生諸漏令不生是無生智淨化身心完成而得到解脫和樂清淨的僧團能適應環境而獲得社會大衆的信仰能淨化身心而得自身的解脫不忽略社會不忽略自己在集團中實現自由而佛法也就達到了久住的目的釋尊以律法攝受僧衆把住持佛法的責任交託他僧團為佛法久住的唯一要素所以與佛陀達磨鼎立而稱為三寶六和敬正法的久住要有解脫的實證者廣大的信仰者這都要依和樂清淨的僧團而實現僧團的融洽健全又以和合為基礎依律制而住的和合僧釋尊曾提到它的綱領就是六和敬六和中見和同解戒和同行利和同均是和合的本質意和同悅身和同住語和無諍是和合的表現從廣義的戒律説佛教中的一切團體的個人的都依戒律的規定而生活律治內容的廣泛與中國古代的禮治有著同樣的精神律包含實際生活的一切但釋尊特別重視思想與經濟使它與戒律並立這就指出大衆和合的根本問題除了律制以外還要注重思想的共同經濟待遇的均衡思想律制經濟三者建立在共同的原則上才有和樂清淨的僧團在僧團中有關大衆與個人的法制固然有要求參加僧團者嚴格服從遵行的義務但如有特權階級特別是執法者不能與守法者同樣的遵守律制必然要影響大衆的團結戒和同行為律治的精神所在就是釋尊也不能違反律制何況其他我們在社團中要有物質上與精神上的適當營養但一般人在物質的享受上總是希求超過別人的優越待遇在思想上又總是滿意自己的意見這物欲的愛著愛思想的固執見如不為適當的調劑節制使它適中就會造成經濟上的不平衡思想上的紛歧在同一集團中如讓經濟的不平思想的龐雜發展起來僧團會演成分崩離析的局面在釋尊當時能注意思想的同一經濟的均衡不能不説是非凡的卓見釋尊説貪欲繫著因緣故王王共諍婆羅門居士婆羅門居士共諍以見欲繫著故出家出家而復共諍雜阿含經卷二五四六經這還不過從偏重而説從佛教的僧團看經濟與思想並重釋尊的不偏於物質也不偏於精神確是到處流露的一貫家風僧團確立在見和戒和利和的原則上才會有平等和諧民主自由的團結才能吻合釋尊的本意負擔起住持佛法的責任有了上面所説的三和和合的本質那表現在僧團中的就必有後三者彼此間在精神上是志同道合的行動上是有紀律而合作的語言文字上是誠實正確充滿和諧友誼的這樣的僧團才是釋尊理想中的僧團事和與理和和合僧是緣起的和合緣起的和合中是有相對的差別性所以在一切佛弟子中分為在家與出家二衆在家衆中男的稱為優婆塞近事男女的稱為優婆夷近事女這是親近三寶的佛教的在家信衆接近佛教在思想與行動上接受佛法的指導照著去行所以叫近事出家衆中也有男女不同男衆又分兩級沙彌勤策是青年而沒有履行完全律制的可説是預科比丘乞士是以佛為模範而學佛所學行佛所行的女衆卻分為三級在預修的沙彌尼勤策女正式的比丘尼乞女之間有式叉摩那尼正學女這是為了特殊情形而制定的兩年特訓其中沙彌是隸屬於比丘的沙彌尼與式叉摩那尼是屬於比丘尼的這男衆女衆的二部僧雖然男女各別組織但在思想上與精神上比丘僧是住持佛法的中心綜合這七衆弟子成為整個的佛教信衆沙彌尼式叉摩那尼比丘尼僧伽比丘僧伽沙彌優婆塞白衣優婆夷釋尊適應當時的環境在出家弟子中有事相上的僧團在家弟子僅是信仰佛法奉行佛法沒有成立團體所以在形迹上有出家的僧伽有在家白衣弟子但從行中道行現覺正法而解脫來説理和同證在家與出家是平等的白衣能理和同證也可稱之為僧伽而且這還是真實僧比形式上的僧伽更值得讚嘆反之出家者如沒有現證的自覺反不過形式而已這事和與理和本來是相待而又不相離的但在佛法的流行中一分青年大衆出家者與白衣弟子們重視理和同證的僧伽忽略六和僧團的作用忽略發揮集團的力量完成正法久住的重任因此而輕視嚴密的僧制白衣者既沒有集團而青年大衆僧中龍蛇混雜不能和樂清淨結果理想中的真實僧漸漸的比虛偽更虛偽號稱入世的佛教反而離開大衆成為個人的佛教另一分耆年的老上座重視事相的僧伽但忽略釋尊制律的原則不變根本不變而條制枝末的適應性不能隨時隨地的適應反而推衍增飾還是為了適應律制成為繁瑣枝末的教條僧俗的隔礙也終於存在從僧伽中心的立場説這是各走極端沒有把握事和與理和原則與條規的綜合一貫性不能圓滿承受釋尊律制的真精神第二章教法第一節能詮的教法能詮與所詮三寶的綜合融貫成一完善健全的佛教從佛法的流行人間來説法是釋尊所開示的僧是秉承釋尊的指導而和合的三寶綜貫的佛教實等於釋尊三業大用的流行釋尊本著自覺的達磨適應當時當地當機者的性格智能與希求加以正確的教導佛法才成為流行於人間的釋尊的教導不只是言教還有身教釋尊的日常生活處人處世一切的語默動靜來去出入無不以智慧為前導無不與實相相應這以身作則的身教訓誨的言教就是釋尊所用以表詮達磨法的釋尊教化的流行構成緣起和合的佛教緣起是相依相成綜合融貫的所以對身教與言教有綜合理解的必要佛教是綜貫整體的但由於所詮事理的相對差別性能詮教法也就形成不礙和合的二類一能詮以言教為主所詮以個人的身心修行為重開示事理的真實諦如由弟子口口相傳的受持稱為教授也稱為狹義的達磨在後代編集的聖典中就稱為法藏也就是展轉傳來的阿含二能詮經釋尊言教的指導身教的示範所詮以大衆的生活行為為主開示道德的戒法以及有關大衆和合與適應社會的制度這除了波羅提木叉的成文法以外一切法制都推行在僧團中稱為教誡也稱為毗奈耶律這所詮的法與毗奈耶要從綜合融貫的立場觀察團體與個人環境與內心事行與理行法制與義理理解彼此相應相成的綜貫性惟有這樣才能完善的了解佛教佛教是人間的能詮的身教言教所詮的法毗奈耶不只是釋尊的三業大用也是實際存在於個人僧伽社會的所以在人間佛教的開展中不應忽略佛弟子的活動在家出家的佛弟子見佛聞法受到佛法的陶冶在語言與行為中表現為佛化的新人其中出家衆在僧伽的和樂清淨中表達佛法僧伽的威力推動佛教的前進在家衆也在社會上表現佛法起著顯化或默化的作用尤其是大弟子們的遊化諸方或彼此論道或向社會宣傳如燈傳照光光無盡這樣的開展雖受到時地人的影響而有不同的適應但釋尊的及門弟子從佛口生從法化生到底有高度的直接性從達磨而有釋尊的自證化他因佛的化他而有僧伽的內修外弘釋尊時代的三寶住世是人間佛教的本源後代佛教的擴展與延續都從此而來詮表能詮表的教法即佛與弟子的身教言教也即是表達佛法的身表與語表身表是身形動作語表是音韻屈曲不但身表的形色如揚眉瞬目舉手低頭不離根身而存在語言的音韻屈曲也是依咽喉唇舌齒齗頰輔等而引發所以身表與語表是依有情的根身而起的但身表與語表不只是根身的是在根身境界意識的因緣和合時為了意識的要求表現才發動根身而引起形色與音聲的流變這樣的身表語表是意境的符號是意識所引起的表詮有指向對象的緣起用從身表語表的根身而現起所以説它是五蘊中的色法也即是物質的但這是緣起的色法並不能離心識與境界而存在的有的執著身表色語表色忽略了它與意識與境界的相依不離有的重視它的詮表意境所以説是思心所的作用有的索性説是識所變現的不注意能詮表的緣起依存性難怪有偏於有情的色法有偏於內心的不同解説了身語二者雖同樣的能詮表佛法但身表多表示內心的情意在知識的事理方面語言的開示解説比身表要明確精密得多記憶對方的教説能照樣的説出來每能不失原意甚至不變原來的語法所以語言的傳授成為教化的主要工具語言的傳誦久了不免會多少失真好在印度人養成相當強的記憶力每有熟誦數百萬言的佛教的原始教典經展轉傳誦到記録出來雖因部派分化有了相當大的差異但還可説大體是相近的音聲的表詮除了語言還有音樂歌頌根本佛法是淳朴的是相對的非樂論者不許以詩頌表達佛説巴利小品於大衆中歌舞戲笑的伎兒釋尊也不以為是正當的職業雜阿含經卷三二九七經出家的弟子更不許過往觀聽但佛弟子中能造偈頌嘆如來德鵬耆舍比丘是增一阿含經弟子品有比丘名跋提於唄中第一十誦律卷三七讚歎三寶功德的偈頌梵唄釋尊也是許可的只是不許為音韻節奏所惑亂罷了身表與語表好在表義的親切可惜缺乏固定性人類的心力能利用身外的東西使它適合自己的意欲間接的表達出情意與思想如雕刻圖畫建築文字等其中書寫的文字也是語言思想的符號有語言思想的精密又有安定性的特長缺點也在這裡人類文化的發達佛法能一直流傳下來文字是有重要貢獻的釋尊的時代雖已有書寫的文字傳有抄録經文的故事但至少當時並沒有用書寫的文字來表詮佛法作為弘揚佛法的工具所以佛經中所説的文字還是語言的不是書寫的這些間接的表詮物以形色為主它所以能表達情意與思想須經過人類意識的陶鑄否則就無所謂表詮文字也不成其為文教了依正覺者看來事事物物的實相一切明白的呈露於我們之前只是我們不能體認它語言文字的教法是先覺者用來表示覺境引導人去體認宇宙人生的實相佛法要在自己及一切中去體認不能老在空虛的名句文身中過活第二節教典略説聖典的編集釋尊時代的佛法有法與毗奈耶律二者法是展轉傳誦的律是半月半月誦説的即波羅提木叉戒經為了誦習的便利用當時流行的名為修多羅契經的短文體如從內容説即法與律修多羅相應不越毗奈耶不違法相的佛法起初是如此的釋尊滅後的第一年夏天尊者摩訶迦葉發起在王舍城外的七葉岩召開結集聖典的大會結集的方式是推出精通法律的聖者誦出法律經大衆的共同審定然後加以編集原始結集的聖典分為經與律即義理定慧修持與戒行的近於現存的雜阿含經及戒經與雜跋渠佛滅百年佛教的東方與西方系為了戒行的見地不同又在毗舍離召開第二次結集大會第二結集的經典以雜阿含經相應修多羅為本加入佛及弟子的遺言景行更為通俗的編集依經文的長短分為中部長部又依增一法編集為增一部這三部加上原有的相應雜教總名為四部阿含經這如瑜伽師地論卷八五説即彼相應教復以餘相處中而説是故説名中阿笈摩説名長阿笈摩説名增一阿笈摩戒律中戒經已有分別解説雜跋渠上座部系名為摩怛理迦律師們後來依它的內容分編為七法八法或作小品大品剩餘的雜碎部分編為雜事後又有分出別編的戒律的改組更張大體上與經法採取同一方式這樣的經律為佛教界共同信任的聖典分別思考而成立的論典或許還沒有但在師資傳授中可以有舍利