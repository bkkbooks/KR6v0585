這雖有別的資益食也難於生存如入定過久由於缺乏段食出定時即不能支持而死亡這可見段食對於人類的重要以定慧的修持來説如營養不足身心過於衰弱定慧也不能成就苦行者不知適宜的段食對於生存及修養的重要性所以會驚奇釋尊的受食而得到正覺要知道段食不但直接的資益營養了肉體有健康的肉體能發生健康的精神所以也間接資益了精神二觸食觸是六根發六識認識六塵境界的觸根境識三者和合時所起合意的感覺叫可意觸生起不合己意的感覺叫不可意觸從此可意不可意觸起樂受苦受等這裡的觸食主要為可意觸合意觸生起喜樂受即能資益生命力使身心健康故觸食也是維持有情延續的重要因素人逢喜事精神爽有些難治的疾病每因環境適宜心境舒暢而得到痊愈反之失意憂愁或受意外的打擊即會憔悴生病甚至死亡近代的衛生學也説樂觀的心情是身體健康不可缺的條件又如修定的人得到定中的喜樂內觸出定後身心輕安雖飲食減少睡眠減少而身心還是一樣的健康又如按摩可以促進身體的健康也是觸食的作用中阿含經伽彌尼經説身粗色四大之種從父母生衣食長養坐臥按摩澡浴強忍這坐臥按摩澡浴強忍等説明了觸對於有情資養的功用即使是不可意觸如運動的感受疲勞等也可以為食的所以雜阿含經卷一五三七三説觸食斷知者三受則斷三意思食意思是意欲思願即思心所相應的意欲意思願欲於有情的延續有強大的作用心理學者説一個人假使不再有絲毫的希望此人決無法生活下去有希望這才資益身心使他振作起來維持下去像臨死的人每為了盼望親人的到來又延續了一些時間的生命所以意思也成為有情的食四識食識指有取識即執取身心的與染愛相應的識識有維持生命延續幫助身心發展的力量識緣名色為佛法中重要的教義如長阿含經大緣方便經所説經中佛對阿難説人在最初託胎的時候有有取識父母和合時有取識即攝赤白二渧成為有機體的生命而展開若識不入母胎者有名色否答曰無也名色指有情的身心自體這個自體由於識的執取資益才在胎中漸次增長起來而出胎而長大成人所以經説若識出胎嬰孩壞敗名色得增長否答曰無也此識的執取直到死亡的前剎那還不能暫離假使一旦停止其執取的作用一期生命即宣告結束肉體即成為死尸所以佛説阿難我以是緣知名色由識緣識有名色有取識對於有情資益延續的力用是何等的重要四食是佛陀深細觀察而揭示的都是人世間明白的事實四食不但有關於現在一期生命的延續即未來生命的延續也有賴於意思食與識食來再創如人類總是希望生存願意長此延續下去這種思願的希欲雖或是極微細的下意識的不必經常顯著表現的但實在是非常的堅強熱烈到臨死生命無法維持時還希圖存在希圖未來的存在一切宗教的來生説永生天國説都是依著這種人類的共欲後有愛而成立的有情的生死相續即依此愛相應的思願所再創所以説五受陰是本行所作本所思願雜阿含經卷一二六經同時有取識即與取相應的識在沒有離欲前他是不會停止執取的捨棄了這一身心立刻又重新執取另一身心這即是入胎識的執取赤白二渧為自體如獼猴的跳樹放了這一枝馬上抓住另一枝此有取識的執持是攬他為己的即愛著此自體融攝此自體以此為自成為身心統一而靈活的個體對於有情身心的和合相續起著特殊的作用現代的學説於維持一期生命的條件前三食都已説到但對於意思食的資益未來識食的執取還少能説明人類的生存欲思食以個體生存為中心深刻而永久的生存欲即後有愛又要求擴大永續的生存即種族繁衍的思願小自家庭大至國族人都希望自家自族的繁衍永續不但人類即小至螻蟻也還是如此這種族生存的延續欲表現於有情與有情間的展轉關係中佛法以人類為本但並不專限於人類的説明普遍到一切有情低級的有情有些是不必有父母子女同在的關係所以雖有種族延續的事實而都由本能的繁殖常缺乏明確的種族意識人類可不然幼弱時期很長須賴家庭父母的撫養生存的需要復雜須賴同族類的保護與互助所以種族延續的意欲也特別強烈這延續種族生命的動力即攝於意思食第二節有情的出生四生有情是生死死生生生不已的一旦本有的生命結束即轉為另一新生命後有的創生從一切有情新生長育的形態去分別起來可分為四類即胎卵濕化四生胎生如人牛羊等卵生如雞鴨雀鴿等濕生如蟲蟻魚蝦等化生如初人等佛説四生是約有情的最初出生到成長期間的形態不同而分別的如胎生最初的自體必須保存在母胎中等到身形完成才能離母體而出生出生後有相當長的幼稚期不能獨立求生要依賴生母的乳哺撫養特別是人類更需要父母師長的教養才漸漸的學會語言知識技能卵生即不同離開母體時還不是完成的身形僅是一個卵須經一番保護孵化現在也有用人功的才能脫卵殼而出有的也需要哺養教導但為期不長多有能自動的生存而成長濕生又不同母體生下卵以後就置之不問或早已死了種子與母體早就脫離關係等到一定時期自己會從卵而出或一再蛻變自謀生存從有情的出生到長成胎生與母體關係最密切幼稚時期也長卵生次之濕生除了生卵以外母子間可説沒有多大關係是最疏遠的幼稚期也極短胎卵濕生的分別就依這樣的意義而成立化生不是昆蟲化蝴蝶等化生是説這類有情不須要父母外緣憑自己的生存意欲與業力就會忽然産生出來從生長的過程説胎生繁復於卵生