中的首陀族沒有信受神教而得再生的權利他們是一切都完了永久沒落幻滅即使是基督教能消泯此一限制但由於神的殘酷性對於人類一期的死亡竟宣告他永生天國與永受火獄的判決不知人類的陷入歧途或由於社會的惡力或由於自己的錯誤本是極為普遍的陷入歧途甚至造成重大罪惡者即使無力自拔也沒有不希望未來的新生即是死了兒孫也不安於父祖的沈淪所以神教者的未來裁判實充滿了無情的殘酷違反人類的共同希求佛法的業力説以一切為有情行為價值所成既成環境的惡劣由於過去的錯誤應從現在身心合理努力中去變革即使是此生無力自拔但未來的慘運並非結局而是過程一切有情在同趨於究竟圓滿的旅程中無論是落於地獄餓鬼畜生輪回而不知出路但終究要在自己身心的改善中完成解脫所以三世業感説豫人類以永不失望的光明四善惡有報非懷疑現生行為與境遇的不必一致引起一些人對於道德律為善得福為惡得禍的懷疑然而人類向上的善行到底需要遵行這不能不對於人生努力向上的行為價值求得一肯定的著落或者寄託於子孫的禍福或者社會的治亂或者內心的安慰與苦痛不過瞽瞍生舜堯生丹朱父子間顯然沒有必然的關係而沒有子女的豈非毫無著落社會的墮落與進步確與我們的行為有關但以此為行為價值的唯一歸著即不能恰當而且地球會毀壞此地球的人類社會也要一切過去我們的善行到底能有多大意義如善行惡行僅招致內心的安慰與苦痛這過於虛玄如作惡者以惡行為快心的豈非即大可以作惡所以人類必須行善不可作惡的價值肯定都不是這些所能説明的特別是行善而遭遇不幸時想以子孫社會內心來安慰決難以滿足一般的要求這樣惟有三世業感説能説明現在行為與遭遇的不一致善惡到頭終有報只爭來早與來遲儘可盡自己的努力以向上不必因現在遭遇而動搖為善的決心肯定行為價值的業感説是怎樣的入情入理第二節業及依業而有的輪回業的本質相依相續的身心活動為有情的事實有情的活動不已從情愛為本的思心所引發一切活動即是行業雜阿含經反覆的説到無明覆愛緣繫得此識身如卷一二二九四經愛結所繫的愛在緣起支中即説為行如説無明緣行行緣識所以愛約我我所的染著説思約反應環境所起的意志推行説行與業約身口意的活動説這本是相依共起的活動不過從它的特性給以不同的稱呼行與業指思心所引發的身心動作説而業又是因活動所引起的勢用這或者解説為經驗的反應或者稱之為生活的遺痕總之由身心的活動而留有力用即稱為業所以古説業有表業與無表業或説業與業集從業的發展過程説由於觸對現境或想前念後思心所即從審慮決定而發動身語的行為在這身語動作時當下即引起業力這可見業是經內心與身語的相互推移而滲合了的所以有以為業是色但沒有質礙有以為是心但也沒有知覺這是不能看為個體性的物質或精神附屬於身心的某部分這是不離有情色心不即有情色心的潛能古來或者因情識為有情的中樞所以説業依於識或者因為業從身心所引發能引發身心所以説依於六處然情識與六處從有情的別別蘊素説而不是從有情的和合相續説所以應該如一類學者所説業依有情而存在業的類別關於業向來有繁廣的説明現在略説三類一定業不定業故意所作的強業必定要受某種果報的名為定業如中阿含經思經説若有故作業我説彼必受其報若不故作業我説此不必受報其實必定與不必定還在我們自己如中阿含經鹽喻經説即使是重大惡業如有足夠懺悔的時間壽長能修身修戒修心修慧重業即輕受而成為不定業這如以多量的鹽投入長江大河並不覺得鹹苦一樣反之如故意作惡沒有足夠的時間來懺悔不能修身修戒修心修慧那就一定受報這如鹽雖不多而投於杯水中結果是鹹苦不堪所以不必為既成的惡業擔心儘可從善業的修習中去對治惡業惟有不知懺悔不知作善業這才真正的決定了成為定業難逃二共業不共業依自作自受的法則自己所作所為的當然由自己負責但人類生於自他共存的社會一舉一動一言一語都直接間接的與他有關對他有利或有害的行業影響自己也影響到他人從影響本身説即不共業從影響他人説即是共業個人的不共業同類相攝異類相拒業用在不斷的熏增或削弱中大衆的共業更是相攝相拒彼此展轉而構成自他間的復雜關係等到相互推移引發出社會的共同趨勢即一般所説的共業所感依共作共受的法則大衆的共業要大家起來改變它聖人也無能為力三引業與滿業如生為人類人與人是一樣平等的人類的壽命根身的構造感官的認識對於自然的享受等都大致相同從這引業所感的業果説人類的主要本質是平等的人與人間所有的差別如相貌不同眷屬不同貧富不同知識才能不同等是過去的滿業與現生業所使然的這種差別不但不全是過去業所規定的更多是由於衆生共業所限制自己現業所造成從引業所感的果報説如生為人類此生即沒有變革的可能由於共業及現生業而如此的即大有改進的餘地不善的當從善業的精進中變革它善的當使它增長使它進展為更完善的佛法重業感而不落於定命論重視現生的進修特別是自己的努力即由於此從前生到後生在不斷的身心活動中有無數的業力增長或消滅這些業力由於性質不同成為一系一系的一系一系中又是一類一類的如五趣果報即有人業天業地獄業畜生業餓鬼業而每一趣業中又有種種差別這種種業力