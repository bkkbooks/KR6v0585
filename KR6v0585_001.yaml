當懺悔懺悔即清淨因為一度的煩惱衝動鑄成大錯即印下深刻的創痕成為進修德行的大障礙不能得定不能發慧如引發定慧必是邪定惡慧佛法的懺悔制於大衆前坦白的披露自己的過失接受僧團規定的處罰經過一番真誠的痛切懺悔即回復清淨如瓶中有毒先要倒去毒物洗滌乾淨才可以安放珍味如布帛不淨先要以灰皂等洗淨然後可以染色所以惟有如法的懺悔才能持律清淨才能使動機不純的逐漸合律懺悔與持戒有著密切的關係所以戒律的軌則不在乎個人在乎大衆不在乎不犯事實上每不能不犯在乎犯者能懺悔清淨學者應追蹤古聖的精神坦白的發露罪惡不敢覆藏不敢再作使自己的身心清淨承受無上的法味持戒與慈悲戒律的廣義包含一切正行但依狹義説重在不殺不盜不淫不妄語等善出家衆的四根本戒比在家五戒更嚴格淫戒連夫婦的正淫也禁止妄語重在未證謂證等大妄語這都與定學有關不殺盜淫妄為根本的戒善出家衆多從消極的禁止惡行説但在家衆持戒即富有積極的同情感要知戒善是合法則的也是由於同情慈悲喜捨的流露而表現於行為的如雜阿含經卷三七一四四經佛為鞞紐多羅聚落長者説若有欲殺我者我不喜我若所不喜他亦如是云何殺彼作是覺已受不殺生不樂殺生淫盜等同釋尊稱這是自通之法即以己心而通他人之心的同情近於儒家的恕道所以身語根本戒的受持不犯不但是他律的不可作也是自律的覺得不應該作這例如不殺不使一切有情受殺生苦也是給一切有情以安全感進一步更要愛護有情的生命戒不即是慈悲的實踐嗎雜阿含經卷三二九一六經佛為刀師氏聚落主説若於有心殺生當自悔責不是不類若不有心殺生無怨無憎心生隨喜心與慈俱如是偷盜對以悲心邪淫對以喜心妄語對以捨心這以四無量心別對四戒不過約它的偏重説其實是相通的如中阿含經波羅牢經佛為波羅牢伽彌尼説自見斷十惡業道念十善業道已便生歡悅生歡悅已便生於喜生於喜已便止息身止息身已便身覺樂身覺樂已便得一心伽彌尼多聞聖弟子得一心已則心與慈俱無結無怨無恚無諍悲喜捨同依五戒八戒十善業而説到四無量心這是經中常見的教説尤其是增一阿含經三寶品以施為施福業五戒四無量為平等福業七覺支為思惟福業這即是施戒定三福業而佛稱戒與四無量為平等福業屬於戒善這是極有意義的平等即彼此的同一大乘所説的平等慈同體悲即是這一深義的發揮慈悲喜捨與定心相應而擴充它即稱為四無量這本是戒的根源由於戒業清淨同情衆生的苦迫即引發慈悲喜捨的無上人上法戒與四無量的相關性可證明佛法止惡行善淨心的一切德行本出於對人類有情的同情而求合於和樂善生的準則戒與慈悲是側重於無瞋善根的但這在限於時機的聲聞法中還不能充分的發揮出來第二節定離欲與定依戒生定是在三業清淨的基礎修得清淨的禪定三昧瑜伽等大同小異為內心體驗必要的修養法印度從奧義書以來已極其流行釋尊參學時也曾學過佛雖不滿於一般的禪但從引發真慧來説不能不説是方便所以在佛法的德行中還是有此一著習定的方法儘可不同但大抵調身調息調心使精神集中而歸於平靜這有一重要事實即修習禪定必以離欲為先如貪戀一般的現實生活那是不能得定的換言之非鄙視輕視現實生活而傾向於內心身心的理想生活不可厭人間欣天國厭此間慕他方都可以得定的禪定的本質不外乎厭此欣彼厭塵欲而欣心樂由於禪定的離欲所以初下手時先呵五欲對於微妙的色聲香味觸認識它的過患而厭棄它尤其是男女欲三界中的欲界側重於五欲及性欲非離這物欲與性欲即不能得定不能生色界天色界是沒有這些欲的所以如不能依定發慧那麼厭離物欲厭離男女欲專心修定即是外道的天行印度一般的出家者即是這樣的佛法的出家生活也即適應這一類根性禪定必須離欲欲到底是什麼呢微妙的五欲不過是誘發情欲的因緣內心一向受著環境的誘惑所以呵責五欲欲是習以成性隨境染著的貪欲所以説欲我知汝本意以思想生我不思想汝則汝而不有法句經雜阿含經卷四八一二八六經説非世間衆事是則之為欲心法馳覺想是名士夫欲佛法的修定離欲重於內心煩惱的調伏並非拒絶世間一切否則守護根門遠離五欲會同於外道波羅奢那的堵塞聰明了雜阿含經卷一一二八二經人類有眼等五根即不能不受用五境生存人間即不能不衣食資生所以佛法的離欲不是拒絶這些是淨化自心而適當的合於社會情況合於身心需要而受用這些不為環境的愛著而牽轉所以雜阿含經卷二一五六四經説三斷有依食斷食中阿含經漏盡經説七斷有從用資生具斷特別是釋尊自身的生活可作確切的證明釋尊的生活不但是糞掃衣也有名貴的金縷衣不但是粗食也有百味食不但樹下坐也住高樓重閣不但獨住山林也常與四衆共住佛雖如此還是被稱為少欲知足無事寂靜中阿含經箭毛經這可見問題在內心不繫戀於環境不追逐於塵欲那麼隨緣適量的享受無不是少欲知足反之如貪欲熾盛那即使遠離人間粗衣惡食也算不得少欲離欲參雜阿含經卷一三三九經同樣的如説女人為男人的戒垢男人為女人的戒垢而戒垢實是內心的情欲所以犯淫戒也不像理學者那樣重視肉體的貞操有比丘因淫欲心重將生殖器割去佛呵責他當斷的貪欲不斷不該斷的倒斷了然而人類生而有男女根淫欲不是生死根本佛法的出家衆為什麼要嚴格禁絶不像對於衣食資生的相對節制呢這可以説衣食是無情的雖與社會有關但比較容易的自由控制男女的牽制繫縛力特別強在男女相互占有的社會結構中苦痛是無法避免的實是障道的因緣在當時的社會中適應當時的出家制所以徹底戒絶男女的淫欲如人間為北俱羅洲式的依此而向出世男女問題也許會像衣食一樣的解決了大乘淨土中有菩薩僧而沒有出家衆即是這社會理想的實現一般的禪定也有觀慧如厭此欣彼的六行觀又如四無色的唯心觀不淨觀與九想觀等都可從定中去修習也可修此來得定但這不一定能解脫佛法常説依定發慧所依的定不必是極深的多少能集中精神就可以了所以不得根本定的或但得未到定的但是一念相應電光喻定的都可以引發勝義慧離煩惱而得解脫如慧解脫阿羅漢不得禪定但對於生死的解脫已切實做到否則定心愈深愈陶醉於深定的內樂中即愈對佛法不相應如因定而生最高或頂好的世界也不能解脫反而是八難的一難佛法修定而不重定是毫無疑問的偏於禪定的必厭離塵境而陶醉於內心久而久之生活必流於忽略世間的現實生活思想必落於神我型的唯心論佛法是緣起論從現實經驗的有情著手立足於心色依存的緣起論有自他和樂的僧制這不是傾向獨善唯心者的境界後期佛法的唯心論與禪師瑜伽師結不解緣這是有它發展的必然性的禪定要遠離物欲與男女欲但不知定境也同樣的是貪欲中阿含經苦陰經中論到五欲主要的是物質占有欲論到色即是男女互相占有的淫欲論到覺即四禪定的定相應受經中一一説明它的味著過患與出離禪定以離物欲及性欲為主而不知禪定也還是無明貪欲的産物這對於專談受用的學者是怎樣適當的教授定與神通佛教的聖者如慧解脫阿羅漢雖究竟解脫還是沒有神通的反之外道得根本定的也有五通依禪定而發神通這是印度一般所公認的神境通天眼通天耳通他心通宿命通五通是禪定所引發的常人所不能的超常經驗這究竟神奇到什麼程度姑且不談總之精神集中的禪師身心能有某些超常經驗這是不成問題的這不是佛法的特色不能獲得正覺的解脫是外道所共有的古代宗教的神祕傳説與有人利用這些神祕現象號召人民作軍事的叛變這都是事實佛法所重的是漏盡通即自覺煩惱的清淨佛弟子能深入禪定的即有此五通佛也不許他們利用這些來傳布佛法更不許利用來招搖名利非特殊情形不能隨便表現如有虛偽報道為佛法的大妄語戒勒令逐出僧團神通對於社會對於自己的危險性惟有釋尊才能深刻理會得那些以神祕來號召傳布佛法的真是我佛罪人第三節慧聞思修與慧無漏慧的實證必以聞思修三有漏慧為方便如不聞不思即不能引發修慧也即不能得無漏慧雜阿含經卷三八四三經曾説四預流支親近善男子聽正法內正思惟法次法向這是從師而起聞思修三慧才能證覺真理得須陀洹預流果這是修行的必然程序不能躐等然從師而起三慧的修學程序可能發生流弊所以釋尊又説四依依法不依人依義不依語依了義不依不了義依智不依識作為修學的依準一親近善知識目的在聽聞佛法但知識不一定是善的知識的善與惡不是容易判斷的佛法流傳得那樣久不免羼雜異説或者傳聞失實所以品德可尊的也不能保證傳授的可信善知識應該親近而不足為佛法真偽的標準這惟有依法不依人依法考辨的方法增一阿含經聲聞品曾略示大綱便作是語我能誦經持法奉行禁戒博學多聞正使彼比丘有所説者不應承受不足篤信當取彼比丘而共論議案法共論與契經相應律法相應者便受持之設不與契經律阿毗曇相應者當報彼人作是語卿當知之此非如來所説考辨的方法佛説為四類一教典與契經律阿毗曇都不與相應不與戒行相應此非如來之藏即否認它是佛法二如教典不合而照他的解説都是與義相應的這應該説此是義説非正經本爾時當取彼義勿受經本這是雖非佛説而合於佛法的可以採取它的義理三如不能確定為是如來所説也為非也而傳説者又是解味不解義的那應該以戒行而問之如合於戒行還是可以採取的四如合於教典合於義理的此真是如來所説義不錯亂應該信受奉行這即是以佛語具三相來考辨釋尊或專約教典説以經為量或專約法義説三法印或專約戒行説波羅提木叉是汝大師這依法不依人是佛法慧命所寄是古代佛法的考證法在依師修學時這是唯一可靠的標準我們要修學佛法不能為宗派所縛口傳所限邪師所害應積極發揮依法不依人的精神辨別是佛説與非佛説以佛説的正經為宗以學者的義説為參考才能引生正確的聞慧二從師多聞正法要從語言文字中體會語文的實義如果重文輕義執文害義也是錯誤的所以依義不依語經上説聞色是生厭離欲滅盡寂靜法是名多聞雜阿含經卷一二五經正法的多聞不是專在名相中作活計是理會真義而能引解脫的行證多聞決不能離聖典語文而空談但也不能執文害義否則儘管博聞強記在佛法中是一無所知的無聞愚夫三義理有隨真理法相説有曲就有情根性説這即是了義與不了義勝義説與世俗説如不能分別以隨機的方便説作為思考的標準就不免顛倒所以説依了義不依不了義這樣才能引發正確深徹的思慧如以一切為了義一切教為圓滿即造成佛法的籠統與混亂四法次法向是修慧依取相分別的妄識而修無論如何也不能得解脫不能引發無漏正智所以説依智不依識應依離相無分別的智慧而修才能正覺引導德行而向於正覺的解脫佛法以正覺的解脫為目標而這必依聞思修三而達到聞慧又要依賢師良友這三慧的修學有必然的次第有應依的標準這對於正法的修學者是應該怎樣的重視釋尊的指示慧與覺證在家出家的聖弟子依八正道行確有如實的悟證境地這是經中隨處可見的到此淨化自心功夫才達到實現怎樣的觀慧才能引發如實覺呢方便是非常衆多的或説四念處觀身不淨觀受是苦觀心無常觀法無我或説四諦觀或説緣起的生起還滅觀但達到根本處切近實證處都是同觀實相的空無相無願三解脫門這是三法印的觀門依無常成無願門依無我成空門依涅槃成無相門等到由此而知法入法即無二無別如前三大理性的統一中説法性是空寂而緣起有的從緣起的生滅邊觀諸行無常與諸法無我從緣起的還滅邊觀諸法無我與涅槃寂靜直從法性説這即是性空緣起的生滅觀生滅即是寂滅所以四諦觀緣起觀或側重緣起流轉而觀不淨苦無常無我都是契入法性空的方便由於適應時機根治對於物欲色欲的繫著所以説苦觀不淨觀如不能依苦而起無量三昧或偏於不淨觀會造成嚴重的錯誤佛世即有比丘厭身而自殺的如雜阿含經卷二九八九經佛為此而教令修安般這那裡是佛法觀慧的常道法是緣起假名而本來空寂的但人類由於無始來的愚昧總是內見我相外取境相不知空無自性而以為確實如此由此成我我所我愛法愛我執法執我見法見必須從智慧的觀察中來否定這些才能證見法性離戲論纏縛而得解脫這必須於此識身及外境界一切相無有我我所見我慢使繫著雜阿含經卷一二三經必須不見一法可取而無罪過者我若取色即有罪過作是知已於諸世間則無所取無所取者自覺涅槃雜阿含經卷一二七二經要不住四識住攀緣斷已彼識無所住於諸世間都無所取無所著無所取無所著已自覺涅槃雜阿含經卷二三九經由慧觀而契入法性不是取相分別識的觀察是從無自性分別而到達離一切取相戲論的如有一毫相可取即不入法性所以如中道的德行從離惡行善的方面説這是要擇善而固執的但從離相證覺説如取著善行以為有善行可行有我能行即成為如實覺的障礙大乘稱之為順道法愛釋尊所以常説法尚應捨何況非法如佛常説地水火風等觀門如於地有地想地即是神我地是神所神是地所彼計地即是神已便不知地於一切有一切想一切即是神一切是神所神是一切所彼計一切即是神已便不知一切中阿含經想經所以佛為跋迦利説真實禪勝義空觀説於地想能伏地想於水火風想無量空入處想識入處想無所有入處非想非非想入處想此世他世日月見聞覺識若得若求若覺若觀悉伏彼想跋迦利比丘如是禪者不依地水火風乃至不依覺觀而修禪雜阿含經卷三三九二六經這是都無所住的勝義空觀迦旃延修這樣的禪觀由於佛的教化緣起假有性空的中道而來雜阿含經卷一二三一經這是慧證法性的不二門第十九章菩薩衆的德行第一節菩薩行通説空與慈悲前來所説的在家與出家約釋尊適應當時的一般聲聞弟子説本章的菩薩雖不出於在家與出家但約追蹤釋尊精神發揮釋尊本懷的佛教徒説菩薩道源於釋尊的本教經三五百年的孕育長成才發揚起來自稱大乘大乘教雖為了適應時機而多少梵化然而它的根本原理到底是光華燦爛能徹見佛法真髓的先從空與慈悲來説明菩薩道空是阿含本有的深義與菩薩別有深切的關係佛曾對阿難説阿難我多行空中阿含經小空經這點瑜伽師地論卷九解説為世尊於昔修習菩薩行位多修空住故能速證阿耨多羅三藐三菩提非如思惟無常苦住這可見菩薩是以修空為主的不像聲聞那樣的從無常苦入手增一阿含經序品也説諸法甚深論空理此菩薩德不應棄如從緣起的三法印的深義説無常即無有常性本就是空的異名但一般聲聞弟子對於無常故苦的教授引起厭離的情緒極深聲聞辟支佛們不能廣行利濟衆生的大事不能與釋尊的精神相吻合他們雖也能證覺涅槃空寂但由於厭心過深即自以為究竟聲聞的方便適應性限制了釋尊正覺內容的充分開展佛從菩薩而成菩薩的觀慧直從緣起的法性空下手見一切為緣起的中道無自性空不生不滅本來寂靜這樣才能於生死中忍苦而不急急的自了從入世度生中向於佛道與戒律有關的慈悲聲聞也不能説沒有的但佛滅百年已被歪曲為粗淺的了四分律七百結集聲聞者不能即俗而真不能即緣起而空寂以為慈悲等四無量心但緣有情不能契入無為性不知四無量心是可以直入法性的如質多羅長者為那伽達多説無量三昧與空三昧無相三昧無所有三昧有差別義也有同一義約無諍義説無量與無相等同樣是能空於貪瞋癡常見我我所見的雜阿含經卷二一五六七經從空相應緣起來説由於有情無自性是相依相緣相成自己非獨存體一切有情也不是截然對立的所以能無怨無瞋無恚了達有情的沒有定量性所以普緣有情的慈悲無緣慈即能契入空性四三昧中三三昧即三解脫門依三法印而成觀無量三昧即是依苦成觀觀一切有情的苦迫而起拔苦與樂的同情即無量心解脫由於聲聞偏重厭自身苦不重愍有情苦偏重厭世不能即世而出世這才以無量三昧為純世俗的聲聞的淨化自心偏於理智與意志忽略情感所以德行根本的三善根也多説離貪欲者心解脫離無明者慧解脫對於離瞋的無量心解脫即略而不論聲聞行的淨化自心是有所偏的不能從淨化自心的立場成熟有情與莊嚴國土但依法而解脫自我不能依法依世間而完成自我這一切等到直探釋尊心髓的行者急於為他才從慈悲為本中完成聲聞所不能完成的一切德行是應該均衡的和諧的擴展不能如聲聞行那樣偏頗如針對厭離情深的聲聞應重視大悲的無瞋對於不善根的根治也認為貪欲是不善的但不是最嚴重的貪欲不一定厭棄有情障礙有情世間多少善事也依貪愛而作成惟有瞋恚對有情缺乏同情才是最違反和樂善生的德行所以説一念瞋心起八萬障門開惡心中沒有比瞋恚更惡劣的菩薩的重視慈悲也有對治性論理應該使無癡的智慧無貪的淨定無瞋的慈悲和諧均衡的擴展到完成從聲聞到菩薩佛法從一般戀世的自私的人生引向出世的無我的人生這有不可忽略的兩點即從家庭而向無家從自他和樂而向自心淨化其中出家的社會意義即從私欲占有的家庭或民族的社會關係中解放出來這一出家從離開舊社會説多少帶點個人自由主義的傾向如從參預一新的社團説這是超家族超國界的大同主義聲聞的出家衆雖有和樂自由民主平等僧團但限於時機乞食獨身的生活在厭世苦行的印度思潮中偏重於己利的個人自由出家的社會意義是私欲占有制的否定而無我公有的新社會當時還不能為一般所了解只能行於出家的僧團中戒律是禁止白衣旁聽的但徹見佛法深義的學者不能不傾向於利他的社會和樂菩薩入世利生的展開即是完成這出家的真義做到在家與出家的統一這是入世不是戀世是否定私有的舊社會而走向公共的和樂的新社會同樣的一般人的自他和樂道德或政法基於私欲的占有制這僅能維持不大完善的和樂聲聞者發現自我私欲的罪惡根源於是從自他和樂而向自心淨化的德行然而淨化自心不但是為了自心淨化因為這才能從離欲無執的合理行為中促進完成更合理的和樂善生這樣菩薩又從自心淨化而回復到自他和樂從自他和樂中淨化自心從自心淨化去增進自他和樂實現國土莊嚴這即是淨化自心與和樂人群的統一所以菩薩行的特點是透出一般人生而回復於新的人生菩薩行的開展是從兩方面發展的一從聲聞出家者中間發展起來起初是外現聲聞身內祕菩薩行自己還是乞食淡泊趣寂但教人學菩薩如大品經的轉教到後來自認聲聞行的不徹底一律學菩薩這如法華經的回小向大現出家相的菩薩多少還保留聲聞氣概這稱為漸入大乘菩薩在菩薩道的開展中不過是旁流二從聲聞在家信衆中間發展起來在家衆修行五法而外多修六念與四無量無量三昧能入真也是質多長者説的這都是大乘法的重要內容如維摩詰善財常啼賢護等十六大士都從在家衆的立場努力於大乘思想的教化這稱為頓入大乘的菩薩是菩薩道的主流新的社會淨土中有菩薩僧大多是沒有出家聲聞僧的天王佛成佛也是不現出家相的印度出家的釋迦佛僅是適應低級世界其實是印度特殊的宗教環境的方便佛的真身是現在家相的如維摩詰示有妻子常樂梵行常啼東方求法也與女人同車這是從悲智相應中作到了情欲與離欲情智的統一聲聞的出家者少事少業度著乞食為法的生活佛法為淨化人類的崇高教化度此淡泊精苦的生活不是負社會的債是能報施主恩的換言之真能修菩薩行專心為法過那獨身生活教化生活當然是可以的然而菩薩行的真精神是利他的要從自他和樂的悲行中去淨化自心的這不能專於説教一途應參與社會一切正常生活廣作利益有情的事業如維摩詰長者的作為如善財所見善知識的不同事業國王法官大臣航海者語言學者教育家數學家工程師商人醫師藝術家宗教師等這些都是出發於大願大智大悲依自己所作的事業引發一般人來學菩薩行為他利他的一切是善的德行也必然增進自己利益自己的利他自利在菩薩行中得到統一第二節從利他行中去成佛三心菩薩行是非常深廣的這只能略舉大要可從般若經的依止三心而行六度萬行來説三心是一切智智相應作意大悲為上首無所得為方便一無所得為方便是菩薩行的善巧技巧一般的行為處處為自我的私欲所纍弄得處處是荊棘葛藤自己不得自在利他也不外自私這惟有體悟空無所得才能解脫自由聲聞雖體悟不取一切法相的空慧由於偏於空寂所以自以為一切究竟不再努力於自利利他的進修這樣無所得又成為障礙了菩薩的空慧雖是法增上的理智但從一切緣起有中悟解得來而且是悲願上求佛道下化有情所助成的所以能無所為而為成為自利利他的大方便二一切智智相應作意是菩薩行的志向一切智智即佛的無上覺心與佛的大覺相應淺顯的説這是以悲智圓成的大覺大解脫為目標立定志向而念念不忘的趨求要求自己也這樣的大覺這是自增上的意志一般的意欲以自我為中心而無限的渴求聲聞行以無貪得心解脫偏於自得自足菩薩的發菩提心是悲智融和淨化了的意志有這大願欲即是為大覺而勇於趨求的菩薩三大悲為上首菩薩行的方便志趣都以大悲為上首的大悲是菩薩行的動機是世間增上的情感為了救濟一切非以無所得為方便一切智智為目標不可菩薩但從大悲生不從餘善生未能自度先度他菩薩於此初發心這是菩薩行的心髓以慈悲為本從利他中完成自利其實是自利與利他的互相促進進展到自利利他的究竟圓成依三心修六度依上面所説的三心才能修菩薩的六度但這是説菩薩的一切德行不能離去這偉大目標純正動機適當技巧不是説三者圓滿了再來修學六度是菩薩行的大綱如增一阿含經序品説菩薩發意趣大乘如來説此種種別人尊説六度無極布施持戒忍精進禪智慧力如月初逮度無極觀諸法現在略敘它的特點一施菩薩布施初發心時即將一切捨與有情不僅是財物就是自己的身體知