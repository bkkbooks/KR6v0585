生生在世間衣食住行等資生物沒有固然苦痛有了也常感困難這是求不得苦義品説趣求諸欲人常起於希望所欲若不遂惱壞如箭中這是求不得苦的解説還有説得更具體的如中阿含經苦陰經説隨其技術以自存活或作田業或奉事王作如是業求圖錢財若不得錢財者便生憂苦愁戚懊惱若得錢財者彼便愛惜守護密藏亡失彼便生憂苦愁戚懊惱以欲為本故母共子諍子共母諍父子兄弟姊妹親族展轉共諍以欲為本故王王共諍梵志梵志共諍居士居士共諍民民共諍國國共諍彼因鬪諍共相憎故以種種器仗轉相加害或以拳扠石擲或以杖打刀斫為了解決這些世間提倡增加生産革新經濟制度等但世間的一切學理制度技術雖能解除少分而終究是不能徹底的如世界能得合理的和平關於資生的物資可能部分解決但有情的個性不同體格興趣知識等不同愛別怨會等苦是難於解免的至於生死等苦更談不上解決一般人但能俯首的忍受或者裝作不成問題世間離苦得樂的方法每每是舊問題還沒解決新問題又層出不窮總是扶得東來西又倒這是由於枝末的而不是根本的如從根本論究起來釋尊總結七苦為略説五蘊熾盛苦此即是説有情的發生衆苦問題在於有情五蘊為有情的蘊素本身有此五蘊而五蘊又熾然如火這所以苦海無邊要解除痛苦必須對此五蘊和合的有情給豫合理的解脫才行所以佛法對於生産的增加政治的革新等雖也認為確要但根本而徹底的解脫非著重於對有情自身的反省體察不可進一步説有情為了解決痛苦所以不斷的運用思想思想本是為人類解決問題的在種種思想中窮究根本的思想理路即是哲學但世間的哲學或從客觀存在的立場出發客觀的存在對於他們是毫無疑問的如印度的順世論者以世界甚至精神都是地水火風四大所組成又如中國的五行説等他們都忽略本身直從外界去把握真實這一傾向的結果不是落於唯物論即落於神祕的客觀實在論另一些人重視內心以此為一切的根本或重視認識想從認識問題的解決中去把握真理這種傾向即會産生唯心論及認識論依佛法離此二邊説中道直從有情的體認出發到達對於有情的存在有情自體是物質與精神的緣成體外界與內心的活動一切要從有情的存在中去把握以有情為本外界與內心的活動才能確定其存在與意義外界根心情有情為物質與精神的和合所以佛法不偏於物質也不應偏於精神不從形而上學或認識論出發而應以現實經驗的有情為本佛法以為一切是為有情而存在應首先對於有情為徹底的體認觀察他來自何處去向何方有情到底是什麼他的特性與活動的形態又如何不但體認有情是什麼還要從體認中知道應該如何建立正確的人生觀探究人生意義而到達深處即是宗教世界的宗教各種各樣的含義也大有出入但有一共同點即人類苦於外來自然社會以及自己身心的層層壓制又不能不依賴它愛好它感到自己的缺陷渺小而又自信自尊想超越它制用它有情在這樣的活動中從依賴感與超越感露出有情的意向成為理想的歸依者宗教於人生從過去到現在都是很重要的不過一般的宗教無論是自然宗教社會宗教自我宗教都偏於依賴感自己意向客觀化與所依賴者為幻想的統一成為外在的神因此有人説宗教是必然有神的他們每以為人有從神分出的質素這即是我們的自我心或靈魂如基督教説人的靈是從上帝那裡來的中國也説天命之謂性藉此一點性靈即可與神接近或合一他們又説人的缺陷罪惡是無法補救的惟有依賴神以虔誠的信仰接受神的恩賜才有希望所以一般宗教在有情以外幻想自然的精神的神作為自己的歸依處想依賴它而得超脫現實的苦迫這樣的宗教是幻想的他力的佛教就不然是宗教又是無神論佛説有情的一切由有情的思想行為而決定佛教的歸依向上向究竟即憑有情自己合法則的思想與行為從契合一切法的因果事理中淨化自己圓成自己所以歸依法即以因果事理的真相為依歸歸依佛與歸依僧佛與僧即人類契合真理法而完成自己的覺者歸依即對於覺者的景仰並非依賴外在的神佛法是自力的從自己的信仰智慧行為中達到人生的圓成佛法與一般宗教的不同即否定外在的神重視自力的淨化這所以非從有情自己説起不可第二節莫辜負此人身人在有情界的地位有精神作用的一切有情佛經分為五趣天人畜生餓鬼地獄此五類即世間的存在者有高級的有低級的在我們所住的世間有人有畜生也有鬼畜生如空中的飛鳥水中的魚龍地上的走獸有無足的兩足的四足的多足的有一棲的兩棲的三棲的種種也稱為傍生即一切禽獸蟲魚的總稱鬼常人雖不易見到但是住在此世間的人類對於鬼的確信或由於夢見死亡的眷屬或由於疫病及病人的所見所聞或由於跳神扶乩等神祕現象其中最主要的為見到死亡者的孤苦飢渴如易所説的遊魂為變這雖有無財少財多財如血食之神的差別從飢渴苦迫得名常稱之為餓鬼傳説唯有生在餓鬼中才會享受兒孫的祭祀這是有情的一類與中國人死為鬼的思想不同比人高一級的是天天中也有高級與低級的低級的天是鬼畜中有大福報者如四王天中的毗樓博叉是龍王是畜生毗沙門是夜叉是鬼四王天以上的帝釋天才是人身的但為帝釋守衛的也還是鬼畜之類比人間低一級的是地獄地獄為各宗教所共同承認的佛經説主要是八熱地獄基督教也説地獄中是火佛經與舊約都有現身入地獄的記事大地裂開人為從地涌出的火焰所籠罩墜入地心地獄在地下即地球中心地心確是火熱的經上又説有八寒地獄或與南北極有關總之是比人間更苦的有從人身也有從鬼畜而下墮的五趣有情的高下分布是這樣天人畜生餓鬼地獄依此圖可知人在五趣中位居中央上有快樂的天堂下是極苦的地獄兩旁是畜生與餓鬼雖在此人間但遠不及人類五趣各是有情的一類而人為五趣的中心為有情上升下墮的機紐此人本的有情觀與中國一般的鬼本論非常不同人類的特勝五趣中平常以為天上最好地獄最苦這是一般宗教的傳統見識怕墮地獄求生天國是他們共同的要求佛法獨到的見地卻以為人間最好這因為一切有情中地獄有寒熱苦幾乎有苦無樂畜生有殘殺苦餓鬼有飢渴苦也是苦多於樂天上的享受雖比人類好但只是庸俗的自私的那種物質欲樂精神定樂的陶醉結果是墮落所以人間最好經中常説人身難得的名言增一阿含經等見品説某天五衰相現將死時有天勸他説你應求生善趣的人間人間有什麼值得諸天崇仰呢經上接著説諸佛世尊皆出人間非由天而得也這即是説諸佛皆在人間成佛所以人為天的善趣值得天神的仰慕成佛是體悟真理實現自由佛陀説法即是宣揚此真理與自由之光真理與自由是天國所沒有的有的只是物欲與定樂諸天是享樂主義者不能警覺世間的苦難不能策發向上所以惟有墮落不能獲得真理與自由釋尊曾説我今亦是人數增一阿含經四意斷品這可見體現真理而解脫成佛不是什麼神鬼或天使是由人修行成就的惟有生在人間才能稟受佛法體悟真理而得正覺的自在這是阿含經的深義我們如不但為了追求五欲還有更高的理想提高道德發展智慧完成自由那就惟有在人間才有可能所以説人身難得佛陀何以必須出在人間人間有什麼特勝這可以分為四點來説一環境天上太樂畜生餓鬼地獄三途太苦太樂了容易墮落太苦了也無力追求真理與自由人間也有近於這兩邊的形態如生活寬裕遺産豐富的由於物質的過分享受窮奢極欲每每汩沒自己弄到墮落而後已反之太貧苦了由於生活的逼迫為衣食等所苦或作殺盜等惡業少有機會能從事學問追求真理與自由苦樂均調的人間尚有此種現象何況極樂的天堂極苦的地獄經上説帝釋天為了佛法特來世間稟受但他在享受五欲時竟然完全忘記了太樂太苦均不易受行佛法唯有苦樂參半的人間知苦而能厭苦有時間去考慮參究才是體悟真理與實現自由的道場二慚愧增一阿含經慚愧品説以其世間有此二法不與六畜共同這是人畜的差別處人趣有慚愧心慚愧是自顧不足要求改善的向上心依於尊重真理法尊重自己尊重世間的法制公意向輕拒暴惡崇重賢善而前進這是道德的向上心能息除煩惱衆惡的動力為人類所以為人的特色之一三智慧三惡趣是缺少智慧的都依賴生得的本能而動作人卻能從經驗的記憶中啓發抉擇量度等慧力能設法解決問題不但有世俗智相對的改善環境身心而且有更高的智慧探求人生的祕奧到達徹底的解脫人間的環境苦樂兼半可以從經驗中發揮出高尚的智慧如不粗不細的石頭能磨出鋒利的刀劍一樣四堅忍我們這個世界叫娑婆世界娑婆即堪忍的意思這世間的人能忍受極大的苦難為了達到某一目的犧牲在所不惜非達到目的不可這雖也可以應用於作惡但如以佛法引導使之趨向自利利他的善業即可難行能行難忍能忍直達圓滿至善的境地這四者環境是從人的環境説後三者是從人的特性説婆沙論解説人為止息意忍末奴沙三義起世經等説勇猛憶念梵行三事的勝於天上與今所説的三者相同慚愧止息意梵行勝智慧末奴沙憶念勝堅忍忍勇猛勝這樣諸佛皆出人間成佛開演教化使人類同得正覺佛法不屬於三途也不屬於諸天惟有人類才是佛法的住持者修學者人生如此優勝難得生在人間又遇到佛法應怎樣盡量發揮人的特長依佛陀所開示的方法前進在沒有完成正覺的解脫以前必須保持此優良的人身若不能保持因惡行而墮入三途或受神教定樂所蒙惑誤向天趣長壽天是八難之一那可以説是辜負了人身如入寶山空手回第四章有情與有情的身心第一節有情的分析三處觀佛法以有情為本那就應該認識有情是什麼佛常用三處觀去觀察有情分別有情的真相但有情的分別觀察要從有情的流轉相續中與身心的相依中去考察不可為靜止的孤立的機械分析有情是有機的活動者如當作靜止孤立的去考察就會發生錯誤誤解佛陀觀察的深意論到三處觀即五蘊觀六處觀六界觀蘊處界的分別觀察是從不同的立場去分別看到有情的各個側面蘊觀詳於心理的分析處觀詳於生理的分析界觀詳於物理的分析依不同的立場而觀有情自體即成立此三種觀門三者並不是截然不同的蘊中的色蘊界中的地水火風可通於非執受的自然界六處雖專為有情身心的分析但從六處而發識緣境即由此説到內心外界的一切這有情中心論的觀察都説到了心與色即證明了有情是色心平等和合相應的存在者不能偏重於物質或精神蘊觀蘊是積聚義即同類相聚如雜阿含經卷二五五經説所有諸色若過去若未來若現在若內若外若粗若細若好若醜若遠若近彼一切總説色陰陰即蘊的異譯佛以慧眼觀有情歸納有情的蘊素為五聚即五蘊色受想行識這五者約情識的能識所識而分所識知中有外界的山河大地等有自己的身體即是色蘊色的定義為變礙如雜阿含經卷二四六經説可礙可分是名色有體積而占有空間所以有觸礙由於觸對變異所以可分析這與近人所説的物質相同眼耳鼻舌身色聲香味觸等都是除