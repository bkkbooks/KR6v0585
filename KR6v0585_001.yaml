學者或者會大聲疾呼斥為道德淪亡類於無父無母的禽獸然在佛法説這是無我我所的實踐者是能行十善業者是能做到不殺不盜不邪淫不妄語者比家庭本位的道德五戒要高尚得多拘羅洲的人沒有膚色種族優劣的差別人類是一樣的平等由於體健進步人間再沒有夭壽的壽終而死也再沒有憂愁啼哭這個世界非常的莊嚴非常的清淨像一所大公園土地肥沃道路平坦氣候冷暖適中到處是妙香音樂光明人類生活於這樣的世界何等的幸福這樣的世界為無數世界中的現實存在者原始佛教仰望中的世界即是這樣的世界而又充滿了佛陀的真理與自由智慧與慈悲這即是這個世界的將來第十章我論因説因第一節佛法以因緣為立義大本總説以有情為中心論到自他心境物我的佛法唯一的特色是因緣論如雜阿含經説我論因説因有因有緣集世間有因有緣世間集有因有緣滅世間有因有緣世間滅卷二五三經因與緣佛陀不曾有嚴格的界説但從相對的差別説因約特性説緣約力用説因指主要的緣指一般的因緣可以總論即每一法的生起必須具備某些條件凡是能為生起某法的條件就稱為此法的因緣不但是生起就是某一法的否定滅而不存在也不是自然的也需要具備種種障礙或破壞的條件這也可説是因緣佛法所説的集生與滅都依於因緣這是在説明世間是什麼為什麼生起怎樣才會滅去從這生滅因緣的把握中指導人去怎樣實行達到目的人生現有的痛苦困難要追求痛苦的原因知道了痛苦的原因即知道沒有此因困苦即會消滅但這非求得對治此困苦的方法不可如害病求醫先要從病象而測知病因然後再以對治病因的藥方使病者吃下才能痊愈因此學佛的有首先推究因緣的必要知道了世間困苦的所以生所以滅的條件才能合理的解決它使應生的生起應滅的滅除從前釋尊初轉法輪開示四諦四諦即是染淨因果的解説苦如病有因緣世間集苦集如病因苦集滅如病愈有因緣世間滅苦滅道如藥無因邪因與正因人類文化的開展本來都由於探求因緣如冷了有求暖的需要於是追求為什麼冷怎樣才會不冷發現取暖的方法一切知識無不從這察果知因中得來不過因緣極為深細一般每流於錯誤在釋尊未出世前印度就有許多外道他們也有講因緣的但以佛的眼光看來他們所講的因緣都不正確佛法稱之為邪因或非因計因還有一類人找不到世間所以生滅的因果關係就以為世間一切現象都是無因的偶然的這種無因論到底是不多的多而又難得教化的要算非因計因的邪因論佛法對於非因計因的邪因論駁斥不遺餘力現略舉三種來説一宿作論也可名為定命論他們也説由於過去的業力感得今生的果報但以為世間的一切無不由生前業力招感的對於現生的行為價值也即是現生的因緣完全抹煞了若真的世間一切現象都是由前生鑄定的那就等於否定現生努力的價值佛法雖也説由前生行為的好惡影響今生的苦樂果報但更重視現生的因緣力如小孩出生後身體是健康的後因胡吃亂喝以致生病死亡這能説是前生造定的嗎如果可以説是前生造定的那麼強盜無理劫奪來的財物也應説是前生造定的了佛法正確的因緣論是徹底反對這種抹煞現生的努力而專講命定的佛法與宿命論的不同就在重視現生努力與否二尊祐論這是將人生的一切遭遇都歸結到神的意旨中以為世間的一切不是人的力量所能奈何的要上帝或梵天才有這種力量創造而安排世間的一切對於這種尊祐論佛法是徹底否定毫不猶疑因為世間的一切有好的也有壞的如完全出於神的意旨即等於否定人生這實是莫大的錯誤不自己努力單是在神前禱告或是許願要想達到目的必然是不可能的佛法否認決定一切運命的主宰人世的好壞不是外來的須由自己與大家來決定以上所説的兩類思想在佛法長期流變中多少混雜在佛法中我們必須認清揀別才好除此兩種邪因論而外有的也談因緣也注重自作自受但還是錯誤的像印度的苦行外道們以為在現生中多吃些苦未來即能得樂其實這苦是冤枉吃的因為無意義的苦行與自己所要求的目的毫沒一點因果關係這也是非因計因這可見一些人表面好像是談因緣究其實都是邪因如人生病宿作論者説這是命中注定的尊祐論者説這是神的懲罰惟有祈禱上帝有的雖説病由身體失調所致可以找方法來治但又不認清病因不了解藥性不以正當的方法來醫治以為胡亂吃點什麼或者畫符念咒病就會好了佛説一切現象無不是有因果性的要求正確而必然的因果關係不可籠統的講因緣佛法所説因果範圍非常廣泛一切都在因果法則中但佛法所重的在乎思想與行為的因果律指導人該怎樣做怎樣才能做得好小呢自己得到安樂大之使世界都得到安樂得到究竟的解脫第二節因緣的類別三重因緣佛法的主要方法在觀察現象而探求它的因緣現象為什麼會如此必有所以如此的原因佛法的一切深義大行都是由於觀察因緣緣起而發見的佛世所談的因緣極其廣泛但極其簡要後代的學佛者根據佛陀的示導悉心參究於是因緣的深義或淺或深的明白出來這可以分別為三層一果從因生現實存在的事物決不會自己如此必須從因而生對因名果在一定的條件和合下才有法的生起這是佛法的基本觀念也就依此對治無因或邪因論如見一果樹即知必由種子肥料水分溫度等種種關係此樹才能長成開花結果決不是從空而生也不是從別的草木金石生不從無因生不從邪因生這即是因緣生因緣是很復雜的其中有主要的或次要的必