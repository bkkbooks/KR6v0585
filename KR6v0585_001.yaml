如確為大乘根性的菩薩衆應該多多為彌勒世界的到來而發心第二十章正覺與解脫第一節聲聞的解脫次第證果賢愚萬別的佛弟子經善知識的教誨僧團的陶練如依法修行誰也能得正覺的解脫正覺三菩提與解脫是佛與聲聞弟子所共同的不過聲聞衆重於解脫佛陀重於正覺罷了在家出家的聲聞衆為了無限生死的苦迫覺了生死的根源是無明貪愛依中道行去修持即能向於正覺到達生死解脫這必須堅毅懇到的精進經非常努力才能豁然大悟超凡成聖轉迷情的生活為正覺的生活學者的進修實證略分四級一須陀洹預流果這是內心初得從來未有的體驗知法入法雖沒有究竟但生死已可説解脫了那時斷了生死根本徹見寂滅法性如説於此法滅如實正慧等見三結盡斷知謂身見戒取疑是名須陀洹果不墮惡道必定正趣三菩提七有天人往生然後究竟苦邊雜阿含經卷三六一經三結是繫縛生死煩惱中最重要的身見即我見由於智慧的證見無我性不再於自身生神我想了如闡陀説不復見我唯見正法雜阿含經卷一二六二經戒取即執種種邪戒苦行祭祀咒術等為能得解脫的聖者不會再生戒取去作不合理的宗教邪行疑是對於佛法僧的猶豫聖者初得法身與佛及僧心心相印還疑惑個什麼依此進修經二斯陀含一來三阿那含不還到究竟解脫的四阿羅漢阿羅漢是生死的解脫者無生煩惱賊的淨盡者殺賊值得供養尊敬的聖者應供如經中説須陀洹雖破除煩惱還有餘慢未盡雜阿含經卷五一五經此慢或稱為慢類這是雖因無我智力不再起分別的我我所見但無始來習以成性的內自恃我還不能淨盡所以還剩有有限七生或一生的生死這需要再經不斷的努力才能徹底根絶達到究竟解脫的境地聲聞的證得初果與四果是極不一致的大智慧的如舍利弗最愚笨的如周梨槃陀伽年齡極老的如須跋陀羅一百二十歲頂年輕的如七歲沙彌均頭阿難從佛極久還沒有證阿羅漢而舍利弗憍陳如們不過幾天就成了阿羅漢而且證得須陀洹以後有現身進修即得阿羅漢的也有證得初果或二果三果後停頓不前的但生死已有限量究竟解脫是不成問題了證果的情形不一大抵基於根性利鈍及信道深信三寶而努力求其實現的精誠程度而定這是人人可得的但如心有所著有所偏不能恰到好處的行乎中道特別是亂心妄執那就非常難得了生死解脫生死解脫在聖者是自覺自證的我生已盡梵行已立所作已辦不受後有現生涅槃的自證智從見法説由於無常無我而悟入法法歸於寂滅現覺得沒有一毫可取可著的這無著無纍的覺證即涅槃無生生死不可得的確證從離欲煩惱説不但在空性的現覺中如日朗天空沒有一些兒陰影即使從此出觀回復平常的心境世俗智也自覺得煩惱不起這是可以試驗的如舍利弗説作是思惟我內心中為離欲不是比丘當於境界或取淨相即故意想男女的親愛聲色的娛心等若覺其心於彼遠離順趣浚注則能堪任自記於五欲功德離欲解脫雜阿含經卷一八四九三經這樣確見自己的煩惱淨盡不會再從自我私欲私見而行動即不會再作感生死的後有業如明燈不再加油不久會歸於息滅現生的證得涅槃不但能確證未來生死的解脫對於現生更能實現解脫的自由這由於通達了無常無我無生人生的究竟真理知道一切的本來空寂一切本來如此而必然如此的如老死無常性的必然到來佛也沒有例外這有什麼悲哀依法持心能於一切苦迫中得解脫什麼都不能撓亂聖者的心情原來人類苦迫無限而歸納起來不外乎兩種一從身而來的身苦即有關於生理的如飢寒等二從心而來的心苦如外物得失的憂惱生離死別的感傷尤其是老死到來感到自己的幻滅罪惡的悔嫌繫戀家族財産而起的痛苦這二者雖有相互影響但一是重於生理的一是重於心理的身苦是一般共感的心苦即因人而不同舍利弗為那拘羅長者説身苦患心不苦患雜阿含經卷五一七經即揭示了佛法修行而得解脫的要義佛弟子的定慧熏修只是到達心地明淨真慧洞徹即使老死到來那樣的痛苦其他的苦可知也不會引起繫戀的心苦慧解脫的身體的痛苦與常人一樣定力深的身苦可以減輕或者毫無痛苦心苦是從自體愛所起的我我所見中引發來的情緒聖者得無我慧即能離愛欲而心得自在解脫從自心淨化的解脫説這是出世法最根本的唯一的重要問題所以經中常説欲貪斷者説心解脫舍利弗説大師唯説調伏欲貪雜阿含經卷五一八經以貪欲即集諦的愛為本的身心是現生苦迫的根本貪愛又是未來流轉的根本解脫了這即現身自作證而得究竟解脫未來不再受生死現時能離去自我執解脫自在從自他和樂的行為中營為正覺的合理生活涅槃生死解脫不是現生不死不是未來永生是未來的生死苦迫的不再起於現生的苦迫中得自在這樣的解脫當體即是涅槃關於涅槃從來有有餘涅槃無餘涅槃的分別依漢譯阿含經説涅槃的一般意義應該是不再來這人世間了如雜阿含經卷三四九五七經説衆生於此處命終乘意生身生於餘處當於爾時因愛故取因愛而住故説有餘世尊得彼無餘成等正覺增一阿含經火滅品也如此説比丘滅五下分結即彼般涅槃不還來此世是謂有餘涅槃界比丘盡有漏成無漏意解脫智慧解脫自身作證而自遊戲是謂無餘涅槃界中阿含經善人往經對於少慢未盡五下分結已斷的更分為七善人而現究竟不再受生死的稱為無餘涅槃這可見涅槃有不再來這人世間受生的意義阿那含與阿羅漢佛也是阿羅漢都不再來人間所以並稱涅槃但阿那含還有煩惱與身的剩餘阿羅漢才是無餘的涅槃是現生自證的自覺人世間生死的解脫無論是於人間究竟或於彼處究竟生死的究竟解脫稱為般涅槃得到涅槃除了衆苦盡滅還可説什麼古德有以為還有身心的有以為有心而沒有身的依契經説這些是妄情的戲論雜阿含經卷三二九五經説如來者色受想行識動慮虛誑有為愛已盡心善解脫甚深廣大無量無數寂滅涅槃如來若有若無若有無若非有非無後生死不可記説又卷三四九六二經説色已斷已知受想行識已斷已知斷其根本如截多羅樹頭無復生分於未來世永不復起甚深廣大無量無數永滅於一切見一切受一切生一切我我所見我慢繫著使斷滅寂靜清涼真實如是等解脫比丘生者不然不生亦不然釋尊對於涅槃除了説明煩惱業苦的不生以外以甚深廣大無量無數來形容甚深廣大與無量無數即法性空寂這是超名相數量以上的如雜阿含經卷三四九六二經説如來法律離諸枝條柯葉唯空幹堅固獨立別譯作瞿曇亦復如是已斷一切煩惱結縛四倒邪惑皆悉滅盡唯有堅固真法身在幻化的身心永滅惟是性空惟是法身這即是涅槃有情的所以個體永續所以無限苦迫只是迷情為本的諸行在我執的攝取住著中形成和合相續的生命個體這才五蘊熾然死生不了如破我除愛即割斷了生死的連索前五蘊滅而後五蘊不再起即唯一法性而不可説為什麼如大海水由於過分寒冷結成冰塊冰塊的個體與海水相礙如天暖冰消那僅是一味的海水更不能想像冰塊的個性何在這樣如想像涅槃中的身心如何或以為小我融於大我擬想超越的不思議的個體實在是妄情的測度所以從有情趣向於涅槃可説此滅故彼滅可説如截多羅樹頭無復生分如直論涅槃那是不能説有也不能説無不能想像為生也不能説是無生這是超名相數量的不可施設的所以焰摩迦以為世尊所説漏盡阿羅漢身壞命終無所有被斥為邪見試問如來見法真實如住無所得無所施設雜阿含經卷五一四經這怎樣可想像為無所有呢本事經卷三也説得極為明白畢竟寂靜究竟清涼隱沒不現惟由清淨無戲論體如是清淨無戲論體不可謂有不可謂無不可謂彼亦有亦無不可謂彼非有非無惟可説為不可施設究竟涅槃第二節佛陀的正覺正覺與解脫的特勝佛陀即得阿耨多羅三藐三菩提無上正遍覺者正覺的普遍性究竟性超過一般聲聞弟子所以佛陀是重於正覺的學佛者也不稱發出離心而説發菩提心聲聞是聞佛教聲而解脫佛卻先未聞法能自覺知現法自知得三菩提雜阿含經卷二六六八四經佛陀的正覺是無貪無瞋無癡的完滿開展究竟圓成而聲聞弟子的正覺是偏於無貪無癡的佛與聲聞的正覺可説有程度上的差別但這是説佛陀的正覺是智慧中心的含攝得無貪無瞋無癡從身心淨化自他和樂的生活中得究竟自在如從智慧的無癡説無漏慧的證法性空與聲聞沒有差別畢竟空是沒有什麼彼此差別的能實現智證空如即轉凡成聖轉迷成悟三乘同性的聖人不是神只是以智證空寂而得離欲解脫的自由人不過慈悲而偏於消極的不害他這是聲聞重於積極的救護他即是從修菩薩行而成佛佛在這三乘同一解脫的聖格中顯出他的偉大有情是身心相依也是自他互成的所以佛陀的正覺不但契合緣起的空性更能透達緣起的幻有慈悲利他的德行更能發揮出來不像聲聞那樣僅是消極的無諍行人間佛陀的無上正遍覺應從真俗無礙悲智相應中去説明與聲聞的差別論到解脫佛與聲聞弟子平等平等如中阿含經瞿默目犍連經説若如來無所著等正覺解脫及慧解脫阿羅訶解脫此二解脫無有差別亦無勝如解脫的平等約解脫能感生死的煩惱及生死説如論到煩惱的習氣即彼此不同如舍利弗還有瞋習畢陵伽婆蹉有慢習這是煩惱積久所成的習性雖然心地清淨沒有煩惱還要在無意間表露於身語意中聲聞的清淨解脫還不能改善習以成性的餘習這雖與生死無關但這到底是煩惱的餘習有礙於究竟清淨古人譬喻説聲聞急於自了斷煩惱不斷習氣這如犯人的腳鐐突然打脫兩腳雖得自由而行走還不方便菩薩於三大阿僧祇劫修行久已漸漸的消除習氣等到成佛即煩惱與習氣一切都斷盡了這如犯人的腳鐐在沒有打脫時已設法使它失去效用等到將腳鐐解去而得自由時兩腳即毫無不便的感覺這解脫的同而不同還是由於聲聞的急於為己菩薩的重於為人佛的相對性與絶對性現實人間的佛陀如釋迦牟尼佛成立於無貪無瞋無癡的均衡擴展成立於尊重真理尊重自己尊重世間而德行能作到時代的完成這是説在聖者正覺的同一性上更有真俗無礙性悲智相應性達到這步田地即是佛這在智證空寂的正覺中沒有彼此差別是徹底的三德的平衡開發是完善的本著這樣徹底而完善的正覺適應當時當地當機無不恰到好處佛陀是究竟圓滿的大乘法中説菩薩初得無生法忍這雖是慈悲相應的約智證空性説與聲聞平等即可稱為得阿耨多羅三藐三菩提可説成佛了究竟圓滿的佛陀不外乎淨化人性擴展人的德能而達到恰好處這才是即人成佛的佛陀實現於人間的佛陀在大乘法的展開中佛陀觀到達無所不知無所不能無所不在絶對無限的佛陀在從現實人間的佛陀説這是多少可以考慮的佛陀雖因久劫修行有廣大的世俗智自發的勝義智但無所不知無所不能無所不在實難以從現實的佛陀中得到證明反之無所不知無所不能無所不在佛也決不因此而稱為佛陀人間世只要是現實存在的即是緣起的存在緣起是有相對的特性的不能無所不在無所不能無所不知佛陀觀的發展到如此因為佛法的普及民間從信徒歸依佛陀的心情中發展出來自釋尊入滅在時空的演變中信衆意欲知識能力存在的無限欲求不能滿足於適應當時人間的佛陀這才想像佛陀為無所不知無所不能無所不在而為任何時代環境信衆所不能超越的推尊為圓滿的絶對的這是理想的是自我本質的客觀化一般宗教幻想此為外在的神而正見的佛弟子即知這是自心的佛是自我意欲本質的客觀化我們知道成佛是智證即三法印的空寂性的這是沒有彼此而可説絶對的徹底的能真俗無礙悲智相應的到達這即是佛陀知識能力存在緣起的一切永遠是相對的這並非人間佛陀的缺陷這才是契當真理雖説是相對的但無論佛陀出現於什麼時代什麼地方他的知識能力存在必是適應而到達恰好的佛陀的絶對性即在這相對性中完成
