即投託該船而得到救濟歸依三寶即在生死大海中的有情信受佛法僧三寶依止三寶而得到度脫歸依的心情是內在的但要有形式的歸依所以學者必自誓説我從今日歸依佛歸依法歸依僧雜阿含經卷一三經佛是佛法的創覺者即創立佛教的領導者法是所行證的常道僧是如實奉行佛法的大衆如通俗的説佛即是領袖法即是主義僧即是集團歸依於三寶即立願參加這覺濟人類的宗教運動或作一般的在家衆或作特殊的出家衆以堅定的信仰來接受來服從來擁護從事佛法的實行與教化經上説佛如醫師法如方藥僧伽如看病者看護為了解脫世間的老病死病貪瞋癡病非歸依三寶不可歸依三寶即確定我們的信仰對象從世間的一般宗教中特別專宗佛法否定一切神教認為唯有佛法才能解脫自己才能救拔有情所以歸依文説歸依佛永不歸依天魔外道等歸依是純一的不能與一般混雜的回邪向正回迷向悟的歸依決非無可無不可的像天佛同化或三教同源論者所説的那樣歸依三寶不能離卻住持三寶但從歸依的心情説應把握歸依三寶的深義歸依本是一般宗教所共同的佛法卻自有獨到處三寶的根本是法佛與僧是法的創覺者與奉行者對於佛弟子是模範是師友是佛弟子景仰的對象修學佛法即為了要實現這樣的正覺解脫所以歸依佛與僧是希賢希聖的憧憬與歸依上帝梵天不同也與歸依神的使者不同因為歸依佛與僧不是想因信得救只是想從善知識的教導中增進自己的福德智慧使自己依人生正道而向上向解脫論到法法是宇宙人生的真理道德的規律是佛弟子的理想界也是能切實體現的境地為佛弟子究竟的歸宿初學者歸依三寶雖依賴外在的三寶引導自己安慰自己但如到達真法的體悟做到了佛與僧那樣的正覺就會明白法是遍一切而徹內徹外的緣起性本無內外差別而無所不在的歸依法即是傾向於自己當下的本來如此佛與僧雖説是外在的實在是自己理想的模範所以歸依佛與僧也即是傾向於自己理想的客觀化從歸依的對象説法是真理佛與僧是真理的體現者但從歸依的心情説只是敬慕於理想的自己即悲智和諧而實現真理的自在者所以學者能自覺自證三寶即從自己身心中實現自己又成為後學者的歸依處了受持五戒歸依三寶不但是參加佛教的儀式還是趨向佛法的信願做一佛弟子無論在家出家如確有歸依三寶的信願必依佛及僧的開示而依法修行歸依是回邪向正回迷向悟的趨向必有合法的行為表現自己為佛化的新人所以經歸依而為佛弟子的要受戒持戒戒本是德行的總名如略義説諸惡莫作衆善奉行自淨其心是諸佛教止惡行善淨心這一切除了自作而外還要教他作讚歎作隨喜作雜阿含經卷三七一五九經戒律本不拘於禁惡的條文不過為了便於學者的受持佛也特訂幾種法規這所以由於所受禁戒的不同五戒十戒二百五十戒等佛弟子也就分為優婆二衆沙彌二衆式叉摩那尼衆比丘二衆七衆歸依與持戒為佛弟子必不可少的德行凡在家弟子應受持五戒五戒是不殺生不偷盜不邪淫不妄語不飲酒這是最一般的近於世間的德行而卻是極根本的這五戒的原則即為了實現人類的和樂生存和樂善生的德行首先應維護人類推及有情的生存要尊重個體的生存所以不得殺生生存要有衣食住等資生物這是被稱為外命的資生物的被掠奪被侵占巧取豪奪都直接間接的威脅生存所以不得偷盜人類的生命由於夫婦的結合而産生夫婦和樂共處才能保障種族生存的繁衍為了保持夫婦的和睦所以除了合法的夫婦以外不得邪淫人類共處於部族及國家世界中由語文來傳達彼此情感交換意見為維護家族國家世界的和樂共存所以不得妄語妄語中如欺誑不實的誑語諂媚以及誨盜誨淫的綺語挑撥是非的兩舌刻薄謾罵的惡口這總稱為妄語而應加禁止使彼此能互信互諒而得到和諧酒能荒廢事業戕害身體更能迷心亂性引發煩惱造成殺盜淫妄的罪惡佛法重智慧所以酒雖似乎沒有嚴重威脅和樂的生存也徹底加以禁止這五者雖還是家庭本位的重於外表的行為沒有淨化到自心而實為人生和樂淨的根本德行出世的德行只是依此而進為深刻的並非與此原則不同第二節佛徒的不同類型在家衆與出家衆由於根性習尚的差別佛弟子種種不同如在家的出家的從歸信佛法説在家出家是一樣的從修證佛法説也沒有多大差別傳説在家弟子能證得阿那含第三果出家能證得阿羅漢第四果如在家的得四果那一定要現出家相在家人不離世務忙於生計不容易達到究竟的境界所以比喻説孔雀雖有色嚴身不如鴻雁能遠飛但也不是絶對不能的不過得了四果會出家而已所以北道派主張在家衆也有阿羅漢那麼在家衆與出家衆有什麼分別呢一生活的方式不同印度宗教舊有在家與出家的二類在家的是婆羅門出家的是沙門出家的遠離家庭財産等世務乞食為生專心修行與在家衆不同釋尊最初弘法時聽衆每當下覺悟這或者自願盡形壽歸依三寶為在家優婆塞優婆夷或者自願出家佛説善來比丘即名出家純由信衆的志願雖沒有受戒儀式即分為二衆所以在家與出家僅能從生活方式的不同來分別後來當然應從受戒差別去分別二負擔任務的不同比丘等從佛出家開始僧團的組合佛世的在家衆是沒有組織的釋尊曾命比丘們分頭去教化將佛法普及到各方五分律卷一六考釋尊的出家即為了不忍有情的苦迫以法攝僧即為了正法久住出家人沒有妻兒家業等紛擾度著淡泊的生活在當時確能弘法利生出家衆重法施在家衆重於財施這雖不一定是一般出家者的本意但釋尊確是將弘法利生的任務託付出家僧惟有在這生活方式負擔任務的不同上能分在家衆與出家衆如約信解行證説實難於分別聲聞與辟支佛聲聞是聽聞佛法聲而修行的為佛弟子的通名通於在家出家此外又有辟支佛即無師自通的獨覺如摩訶迦葉即是辟支佛根性考釋尊教化的出家弟子本有二類一人間比丘二阿蘭若比丘人間比丘生活不過分的刻苦遊化人間過著和樂共住的大衆集團生活阿蘭若比丘如迦葉那樣是絶對厭惡女性的阿難勸釋尊度女衆出家曾受到迦葉的責難專修頭陀苦行的好靜而獨住阿蘭若的甚至不願為大衆説法的雜阿含經卷四一一一三八經又一一三九經釋尊的時代厭世苦行的風氣非常濃所以從佛出家的弟子阿蘭若比丘也不少他們以為修行是應該如此的提婆達多的五法是道即頭陀行的極端者如迦葉那樣的獨覺根性是典型的頭陀行者頭陀第一厭世極深而自尊心又極強他自信為若如來釋尊不成無上正真道者我則成辟支佛增一阿含經一入道品自以為沒有佛的教化也會自覺的所以傳説辟支佛勝於聲聞頭陀行是印度一般所風行的迦葉早就修學這些他以為這是辟支佛所必行的如增一阿含經一入道品説辟支佛盡行阿練若行頭陀但釋尊並沒有修頭陀行聲聞弟子也不一定行頭陀行而且還勸迦葉不要修頭陀行雜阿含經卷四一一一四一經增一阿含經莫畏品又一入道品但迦葉不肯説我今不從如來教彼辟支佛盡行阿練若行頭陀如今不敢捨本所習更學餘行增一阿含經一入道品釋尊也只得方便的安慰他讚歎頭陀功德總之釋尊教化的聲聞弟子已受到時機的限制不能大暢本懷而頭陀苦行的阿蘭若比丘辟支根性更與釋尊的人間佛教精神上大大的不同釋尊涅槃後摩訶迦葉頭陀系壓倒阿難而取得僧團的領導地位聲聞佛法這才加深了苦行隱遁獨善的傾向被菩薩行者呵責為小乘菩薩聲聞是釋尊教化的當機但有極少數更能契合釋尊正覺真精神的稱為菩薩如彌勒善財等釋尊未成佛前也稱為菩薩菩薩義譯為覺有情是勇於正覺的欲求者菩薩的修行如本生談所説或作王公宰官或作商人農工或作學者航海家等側重於利益有情的事業不惜犧牲自己充滿了慈悲智慧的精進這不是一般聲聞弟子所及的菩薩如出家即像彌勒上生經説不修禪定不斷煩惱這是急於為衆而不是急於為己的是福慧並重而不是偏於理智的是重慧而不重定的是不離世間利濟事業而淨自心不是厭世隱遁而求解脫的佛世的阿難為了多聞正法侍奉佛陀不願意急證阿羅漢沓婆得阿羅漢後為了廣集福德而知僧事富樓那冒險去化導獷悍的邊民都近似菩薩的作風這類重於為他的根性在佛法的流行中逐漸開拓出大乘顯示釋尊正覺的真義第十六章在家衆的德行第一節一般的世間行人天行出世的德行是一般德行的勝進是以一般人的德行為基礎而更進一步的佛法為了普及大衆漸向解脫所以有依人生正行而向解脫的人天行佛弟子未能解脫以前常流轉於人間天上而佛法以外的常人如有合理的德行也能生於人天所以佛法的世間正行是大體同於世間德行的釋尊為新來的聽衆説法總是如諸佛法先説端正法聞者歡悅謂説施説戒説生天法如中阿含經教化病經我們知道生死是相續的業力的善惡會決定我們的前途在沒有解脫以前應怎樣使現生及來生能進步安樂這當然是佛弟子關切的問題佛法不但為了究竟樂也為了現法樂與後法樂怎樣使現生與未來能生活得更有意義更為安樂是增上生的人天心行也即是修學某些德行能使現實的人生更美滿未來能生於天上人間釋尊的時代一般人或要求人間的美滿或盼望天宮的富樂自由依佛法真義説天上不如人間但隨俗方便也説生天的修行印度宗教的人天法充滿了宗教的迷信生活祭祀祈禱咒術等而佛説的人天法即純為自他和樂的德行施與戒及淨化自心的禪定主要為慈悲喜捨的四無量心布施不如持戒持戒不如慈悲等定這是佛為須達多長者所説的增一阿含經等趣四諦品布施是實際利他的善行但一般常含有不純正的動機如有為求財故施或愧人故施或為嫌責故施或畏懼故施或欲求他意故施或畏死故施或誑人令喜故施或自以富貴故應施或諍勝故施或妬瞋故施或憍慢自高故施或為名譽故施或為咒願故施或解除衰求吉故施或為聚衆故施或輕賤不敬施大智度論這都不是佛陀所讚嘆的即使是善心淨心的布施究竟是身外物的犧牲不及持戒的功德持戒是節制自己的煩惱使自己的行為能合於人間和樂善生的目標然一般的説持戒還偏重身語的行為如慈悲喜捨等定降伏自心的煩惱擴充對於一切有情的同情這種道德心的淨化長養更是難得的即使還不能正覺解脫也能成為解脫的方便所以釋尊常説布施持戒能生人天要生色界天以上非修離欲的禪定不可不過禪定是傾向於獨善的偏重於內心的如修慈悲欣厭等禪定而取著即會生於天國從正覺的佛法説還不如持戒而生於人間的穩當正常的經濟生活在家衆首先應顧慮到經濟生活的正常因為有關於自己家庭的和樂更有關於社會釋尊曾為少年鬱闍迦説有四法俗人在家得現法安現法樂雜阿含經卷四九一經一方便具足是種種工巧業處以自營生如沒有知識技能從事正當的職業寄生生活是會遭受悲慘結局的善生經也説先當習技藝然後獲財業正當的職業如田種行商賈牧牛羊興息邸舍以求利造屋舍床臥六種資生具雜阿含經卷四八一二八三經種田商